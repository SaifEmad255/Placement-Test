<html>
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Variables for the game
        let memoryCards = [];
        let flippedCards = [];
        let correctPairs = 0;

        // Function to initialize the game
        function initGame() {
            // Logic to create memory cards and shuffle them
            const questionTexts = ['Question 1', 'Question 2', 'Question 3']; // Placeholder for question texts
            memoryCards = questionTexts.map((text, index) => ({
                id: index,
                text: text,
                flipped: false
            }));
            memoryCards = shuffle(memoryCards);
            renderCards();
        }

        // Function to shuffle cards
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Function to render cards
        function renderCards() {
            $('#card-container').empty();
            memoryCards.forEach(card => {
                $('#card-container').append(`<div class='card' id='card-${card.id}' onclick='flipCard(${card.id})'>${card.flipped ? card.text : '?'}</div>`);
            });
        }

        // Function to flip a card
        function flipCard(cardId) {
            const card = memoryCards.find(c => c.id === cardId);
            if (!card.flipped) {
                card.flipped = true;
                flippedCards.push(card);
                renderCards();

                // Check if two cards are flipped
                if (flippedCards.length === 2) {
                    setTimeout(checkForMatch, 1000);
                }
            }
        }

        // Function to check for a match
        function checkForMatch() {
            const [firstCard, secondCard] = flippedCards;
            if (firstCard.text === secondCard.text) {
                correctPairs++;
            } else {
                firstCard.flipped = false;
                secondCard.flipped = false;
            }
            flippedCards = [];
            renderCards();
            if (correctPairs === memoryCards.length / 2) {
                alert('You have matched all pairs!');
            }
        }

        $(document).ready(initGame);
    </script>
</head>
<body>
    <div id="card-container"></div>
</body>
</html>
