<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bel-Engleezi | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body { 
            margin: 0; 
            padding: 0;
            font-family: 'Montserrat', 'Cairo', sans-serif; 
            color: #fff; 
            overflow-x: hidden; 
            user-select: none;
            background: linear-gradient(135deg, #0f1b3c 0%, #1a2850 50%, #0f1b3c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            width: 100%;
        }
        
        body {
            background: linear-gradient(135deg, #0f1b3c 0%, #1a2850 50%, #0f1b3c 100%) !important;
            background-attachment: fixed !important;
        }

        body.female-under20, body.female-over20 {
            background: linear-gradient(135deg, #0f1b3c 0%, #1a2e5a 25%, #2d1b4e 50%, #1a2850 75%, #0f1b3c 100%) !important;
            background-attachment: fixed !important;
        }
        
        body.male-under20, body.male-over20 {
            background: linear-gradient(135deg, #0f1b3c 0%, #182a4a 25%, #1a3a5a 50%, #142a48 75%, #0f1b3c 100%) !important;
            background-attachment: fixed !important;
        }
        
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.6);
            animation: float 25s infinite linear;
        }
        
        .particle.gold {
            background: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.7);
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        
        .glass-panel { 
            background: linear-gradient(135deg, rgba(15, 27, 60, 0.92), rgba(26, 40, 80, 0.88));
            backdrop-filter: blur(25px);
            border: 2px solid rgba(212, 175, 55, 0.35);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(212, 175, 55, 0.2),
                0 0 30px rgba(212, 175, 55, 0.12);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            padding: 40px;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            animation: shimmer 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, 10px); }
        }
        
        #start-screen {
            animation: slideInFormLuxury 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            max-width: 450px;
            z-index: 10;
        }
        
        @keyframes slideInFormLuxury {
            from { 
                opacity: 0; 
                transform: translateY(-60px) scale(0.85) rotateX(-30deg);
                filter: blur(10px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1) rotateX(0deg);
                filter: blur(0px);
            }
        }

        #quiz-area {
            animation: slideInQuizArea 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 600px;
            width: 100%;
            padding: 0 16px;
        }

        @keyframes slideInQuizArea {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #quiz-area .glass-panel {
            animation: cardEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) rotateX(-20deg) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg) scale(1);
            }
        }

        select {
            background-color: rgba(212, 175, 55, 0.1) !important;
            color: #d4af37 !important;
            font-weight: 600 !important;
            border: 2px solid rgba(212, 175, 55, 0.3) !important;
            border-radius: 8px !important;
            padding: 12px !important;
            outline: none !important;
        }
        
        select option {
            background: #1a2850;
            color: #d4af37;
            padding: 12px;
        }

        select:focus {
            border-color: rgba(212, 175, 55, 0.6) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3) !important;
        }
        
        .opt-btn { 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(212, 175, 55, 0.4) !important;
            cursor: pointer; 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(212, 175, 55, 0.04)) !important;
            padding: 13px 16px !important;
            margin: 5px 0 !important;
            position: relative;
            overflow: hidden;
            color: #fff !important;
            font-weight: 600 !important;
            border-radius: 12px !important;
            text-align: left !important;
        }
        
        .opt-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            z-index: 0;
        }
        
        .opt-btn:hover:not(:disabled)::before {
            width: 300px;
            height: 300px;
        }
        
        .opt-btn:hover:not(:disabled) { 
            transform: scale(1.08) translateY(-2px) !important;
            border-color: rgba(212, 175, 55, 0.8) !important;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.08)) !important;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3) !important;
        }
        
        .opt-correct { 
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.25), rgba(16, 185, 129, 0.15)) !important;
            border-color: #10b981 !important;
            animation: correctPulse 0.6s ease-out;
            box-shadow: 0 0 25px rgba(52, 211, 153, 0.4) !important;
        }
        
        .opt-wrong { 
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.25), rgba(239, 68, 68, 0.15)) !important;
            border-color: #ef4444 !important;
            animation: wrongShake 0.5s ease-out;
            box-shadow: 0 0 25px rgba(248, 113, 113, 0.4) !important;
        }
        
        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            75% { transform: translateX(12px); }
        }
        
        #tool-magic {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            margin: 25px 0;
            min-height: 160px;
        }
        
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .countdown-box {
            text-align: center;
            animation: popInLuxury 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popInLuxury {
            0% { transform: scale(0.2) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .countdown-timer {
            font-size: 6.5rem;
            font-weight: 900;
            margin: 20px 0;
            color: #d4af37;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.8), 0 0 80px rgba(212, 175, 55, 0.4);
            animation: pulseLuxury 1s ease-in-out infinite;
        }
        
        @keyframes pulseLuxury {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .m-card {
            width: 95px;
            height: 135px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            animation: slideUpCard 0.6s ease-out;
        }
        
        .m-card:hover:not(.flipped) {
            transform: translateY(-10px);
        }
        
        @keyframes slideUpCard {
            from { transform: translateY(40px) rotateX(-70deg); opacity: 0; }
            to { transform: translateY(0) rotateX(0deg); opacity: 1; }
        }
        
        .m-card.flipped {
            transform: rotateY(180deg);
        }
        
        .m-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s;
            transform-style: preserve-3d;
        }
        
        .m-card-front, .m-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 3px solid rgba(212, 175, 55, 0.5);
            font-size: 0.7rem;
            padding: 8px;
            text-align: center;
            line-height: 1.1;
        }
        
        .m-card-front {
            background: linear-gradient(135deg, #0f1b3c, #1a2850);
            color: #d4af37;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            box-shadow: inset 0 1px 0 rgba(212, 175, 55, 0.3), 0 0 15px rgba(212, 175, 55, 0.2);
        }
        
        .m-card-back {
            background: linear-gradient(135deg, #d4af37, #e5c158);
            color: #0f1b3c;
            transform: rotateY(180deg);
            font-size: 2.2rem;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .m-card-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .m-card.found .m-card-back {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.8);
        }
        
        .exp-text { 
            color: #fff; 
            font-size: 0.9rem; 
            line-height: 1.6; 
        }
        
        .celebration-emoji {
            font-size: 4.5rem;
            animation: bounceLuxury 0.8s ease-in-out infinite;
        }
        
        @keyframes bounceLuxury {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-35px) rotate(15deg); }
        }
        
        .score-display {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #d4af37, #e5c158);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            animation: scoreGlow 2s ease-in-out infinite;
        }
        
        @keyframes scoreGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8)); }
        }
        
        .start-btn {
            width: 100%;
            margin-top: 40px;
            background: linear-gradient(135deg, #d4af37, #e5c158);
            color: #0f1b3c;
            font-weight: 900;
            font-size: 1.125rem;
            padding: 16px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            position: relative;
            overflow: hidden;
            z-index: 20;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .start-btn:hover::before {
            width: 500px;
            height: 500px;
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #e5c158, #d4af37);
        }

        .start-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #20BA58);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .whatsapp-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.5s ease;
        }
        
        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.8);
        }
        
        .whatsapp-btn:hover::before {
            left: 100%;
        }

        #options-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        #q-text {
            margin-bottom: 0;
            font-size: 1.35rem;
            line-height: 1.5;
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: questionAppear 0.6s ease-out;
            color: #d4af37;
            font-weight: 700;
        }
        
        @keyframes questionAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #exp-box {
            margin-top: 14px;
            padding: 16px;
            font-size: 0.85rem;
            animation: expandBoxLuxury 0.5s ease-out;
            color: #fff;
            border-radius: 12px;
            text-align: right;
        }
        
        @keyframes expandBoxLuxury {
            from { opacity: 0; max-height: 0; transform: translateY(-15px); }
            to { opacity: 1; max-height: 400px; transform: translateY(0); }
        }

        #btn-next {
            margin-top: 16px;
            padding: 13px;
            font-size: 1rem;
            animation: slideInUpBtn 0.5s ease-out;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #d4af37, #e5c158);
            color: #0f1b3c;
            font-weight: 900;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }
        
        @keyframes slideInUpBtn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #btn-next::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            z-index: 0;
        }
        
        #btn-next:hover::before {
            width: 400px;
            height: 400px;
        }

        #btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.5);
        }

        #tool-listen {
            margin-top: 12px;
            margin-bottom: 12px;
        }

        #tool-listen button {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            border: 2px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #tool-listen button:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.35), rgba(212, 175, 55, 0.2));
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.08);
        }

        #tool-read {
            margin-top: 12px;
            margin-bottom: 12px;
            color: #fff;
            border: 2px solid rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            padding: 12px;
        }

        input {
            color: #d4af37;
            font-weight: 600;
            background-color: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            padding: 12px;
            width: 100%;
        }
        
        input::placeholder {
            color: rgba(212, 175, 55, 0.6);
        }
        
        input:focus {
            background-color: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            outline: none;
        }
        
        header {
            background: linear-gradient(135deg, rgba(15, 27, 60, 0.85), rgba(26, 40, 80, 0.85));
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        h1, h2 {
            color: #d4af37;
        }
        
        label {
            color: #d4af37;
            font-weight: 600;
        }

        p {
            color: #d4af37;
        }

        main {
            position: relative;
            z-index: 1;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .space-y-5 > * + * {
            margin-top: 1.25rem;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="particle-bg" id="particle-container"></div>

    <header class="p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-full border-2 border-yellow-600 overflow-hidden bg-gradient-to-br from-yellow-600 to-yellow-800">
                <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=BE&background=d4af37&color=0f1b3c';">
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tight">Bel-Engleezi</h1>
                <p class="text-yellow-600 text-xs font-bold tracking-widest uppercase">Elite Academy</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div id="timer" class="hidden font-mono text-lg border-2 border-yellow-600 px-3 py-1 rounded-full bg-black/30 text-yellow-400">30:00</div>
        </div>
    </header>

    <main>
        <div id="start-screen" class="glass-panel w-full" style="margin: auto;">
            <h2 class="text-4xl font-black text-center mb-8">Student Entry</h2>
            <div class="space-y-5" dir="rtl">
                <div>
                    <label class="block font-bold mb-2 text-base">الاسم بالكامل</label>
                    <input type="text" id="u-name" placeholder="أدخل اسمك الكامل">
                </div>
                <div>
                    <label class="block font-bold mb-2 text-base">المرحلة العمرية</label>
                    <select id="u-age">
                        <option value="" disabled selected>اختر المرحلة العمرية</option>
                        <option value="Under 20">أقل من 20 سنة</option>
                        <option value="Over 20">أكبر من 20 سنة</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold mb-2 text-base">النوع</label>
                    <select id="u-gender">
                        <option value="" disabled selected>اختر النوع</option>
                        <option value="Male">ذكر</option>
                        <option value="Female">أنثى</option>
                    </select>
                </div>
            </div>
            <button class="start-btn" type="button">ابدأ التحدي 🚀</button>
        </div>

        <div id="quiz-area" class="hidden w-full">
            <div class="flex items-center gap-3 mb-6 glass-panel p-3 rounded-xl">
                <div class="flex-grow h-3 bg-black/40 rounded-full overflow-hidden border border-yellow-600/30">
                    <div id="prog-bar" class="h-full bg-gradient-to-r from-yellow-500 to-yellow-400 w-0 transition-all duration-700 rounded-full"></div>
                </div>
                <span id="q-num" class="font-black text-yellow-400 text-sm tracking-widest">01/25</span>
            </div>

            <div class="glass-panel rounded-xl">
                <h2 id="q-text"></h2>
                
                <div id="tool-listen" class="hidden text-center mt-3">
                    <button type="button">🔊 استمع</button>
                </div>
                <div id="tool-read" class="hidden text-xs max-h-28 overflow-y-auto mt-3"></div>
                
                <div id="tool-magic" class="hidden mt-4"></div>

                <div id="options-box"></div>
                
                <div id="exp-box" class="hidden"></div>

                <button id="btn-next" type="button" class="hidden">السؤال التالي ⮕</button>
            </div>
        </div>
    </main>

    <div id="countdown-overlay" class="hidden countdown-overlay">
        <div class="countdown-box">
            <div class="text-3xl font-black mb-4 text-yellow-400">خذ نفس عميق وركز</div>
            <div class="countdown-timer" id="countdown-number">5</div>
            <div class="text-2xl text-yellow-300 font-bold">استعد للعبة الممتعة 🎮</div>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particle-container');
            if(!container) return;
            container.innerHTML = '';

                o.connect(g); 
                g.connect(actx.destination);
                let n = actx.currentTime;
                if(t==='ok'){ 
                    o.frequency.setValueAtTime(650,n); 
                    o.frequency.setValueAtTime(850,n+0.1); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.2); 
                }
                if(t==='err'){ 
                    o.frequency.setValueAtTime(200,n);

        function generateSecureHash(name, score, timestamp) {
            let data = `${name}|${score}|${timestamp}|BEL2024SECURE`;
            let hash = 0;
            for(let i = 0; i < data.length; i++) {
                let char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }
