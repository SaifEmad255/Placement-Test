<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Test Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .quiz-header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .progress {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            background: #667eea;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .question-section p {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card-wrapper {
            perspective: 1000px;
            cursor: pointer;
            height: 150px;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            backface-visibility: hidden;
            padding: 10px;
            text-align: center;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 32px;
        }

        .card-front:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .card-back {
            background: white;
            color: #333;
            transform: rotateY(180deg);
            border: 2px solid #667eea;
        }

        .card-back p {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-next {
            background: #667eea;
            color: white;
        }

        .btn-next:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .results {
            display: none;
            text-align: center;
            padding: 30px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .score {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .result-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 20px;
            }

            .card-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .question-section {
                min-height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📚 Quiz Game</h1>
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div id="quizContent">
            <div class="question-section">
                <p id="questionText"></p>
            </div>

            <div class="card-container" id="cardContainer"></div>

            <div class="button-group">
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">السؤال التالي →</button>
                <button class="btn-reset" onclick="resetQuiz()">إعادة تعيين</button>
            </div>
        </div>

        <div class="results" id="results">
            <h2>انتهيت من الاختبار! 🎉</h2>
            <div class="score" id="scoreDisplay"></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="btn-next" onclick="resetQuiz()">إعادة محاولة</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "ما هي عاصمة فرنسا؟",
                options: ["باريس", "لندن", "برلين", "مدريد"],
                correct: 0
            },
            {
                question: "كم عدد كواكب المجموعة الشمسية؟",
                options: ["7", "8", "9", "10"],
                correct: 1
            },
            {
                question: "من هو أعظم رياضياتي في التاريخ؟",
                options: ["مايكل جوردان", "محمد علي", "بيليه", "دييغو مارادونا"],
                correct: 1
            },
            {
                question: "في أي سنة بدأت الحرب العالمية الثانية؟",
                options: ["1939", "1941", "1945", "1938"],
                correct: 0
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function initQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            loadQuestion();
        }

        function loadQuestion() {
            const question = quizData[currentQuestion];
            document.getElementById('questionText').textContent = question.question;

            const cardContainer = document.getElementById('cardContainer');
            cardContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'card-wrapper';

                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${index}`;

                const cardFront = document.createElement('div');
                cardFront.className = 'card-face card-front';
                cardFront.textContent = '?';

                const cardBack = document.createElement('div');
                cardBack.className = 'card-face card-back';
                cardBack.innerHTML = `<p>${option}</p>`;

                card.appendChild(cardFront);
                card.appendChild(cardBack);

                cardWrapper.onclick = () => selectAnswer(index, question.correct);
                cardWrapper.appendChild(card);
                cardContainer.appendChild(cardWrapper);
            });

            answered = false;
            updateProgress();
        }

        function selectAnswer(selectedIndex, correctIndex) {
            if (answered) return; // منع الإجابة المتعددة

            answered = true;
            const card = document.getElementById(`card-${selectedIndex}`);
            card.classList.add('flipped');

            if (selectedIndex === correctIndex) {
                score++;
                card.style.borderColor = '#4caf50';
            } else {
                card.style.borderColor = '#f44336';
                // أظهر الإجابة الصحيحة
                const correctCard = document.getElementById(`card-${correctIndex}`);
                correctCard.classList.add('flipped');
                correctCard.style.borderColor = '#4caf50';
            }
        }

        function nextQuestion() {
            if (!answered) {
                alert('يرجى اختيار إجابة أولاً!');
                return;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('results').classList.add('show');

            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('scoreDisplay').textContent = `${score} / ${quizData.length}`;

            let message = '';
            if (percentage === 100) {
                message = '👏 رائع! أنت محترف!';
            } else if (percentage >= 80) {
                message = '🌟 ممتاز! أداء جيد جداً!';
            } else if (percentage >= 60) {
                message = '👍 جيد! يمكنك التحسن أكثر';
            } else {
                message = '📚 حاول مرة أخرى وتعلم المزيد!';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function resetQuiz() {
            initQuiz();
        }

        // تشغيل الاختبار عند تحميل الصفحة
        window.onload = initQuiz;
    </script>
</body>
</html>
