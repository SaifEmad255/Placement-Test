<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bel-Engleezi | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', 'Cairo', sans-serif; color: #fff; overflow-x: hidden; user-select: none; }
        
        /* Modern Gradient Background */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        
        /* Select dropdown fix */
        select {
            background-image: none !important;
            background-color: rgba(255,255,255,0.1) !important;
            color: #fff !important;
        }
        
        select option {
            background: #667eea;
            color: white;
            padding: 10px;
        }
        
        .opt-btn { 
            transition: all 0.3s; 
            border: 2px solid rgba(255,255,255,0.3); 
            cursor: pointer; 
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            margin: 4px 0;
        }
        .opt-btn:hover:not(:disabled) { 
            transform: scale(1.05); 
            border-color: rgba(255,255,255,0.8); 
            background: rgba(255,255,255,0.15); 
        }
        .opt-correct { background: rgba(52, 211, 153, 0.3) !important; border-color: #34d399 !important; }
        .opt-wrong { background: rgba(248, 113, 113, 0.3) !important; border-color: #f87171 !important; }
        
        /* Memory Cards Styling */
        #tool-magic {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            margin: 30px 0 20px 0;
            min-height: 160px;
        }
        
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        
        .countdown-box {
            text-align: center;
            animation: popIn 0.6s ease-out;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .countdown-timer {
            font-size: 5rem;
            font-weight: 900;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            animation: pulse 1s ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .m-card {
            width: 85px;
            height: 120px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            position: relative;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .m-card.flipped {
            transform: rotateY(180deg);
        }
        
        .m-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .m-card-front, .m-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 2px solid rgba(255,255,255,0.5);
            font-size: 0.65rem;
            padding: 6px;
            text-align: center;
            line-height: 1.1;
        }
        
        .m-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .m-card-back {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            transform: rotateY(180deg);
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.5);
        }
        
        .exp-text { color: #fff; font-size: 0.9rem; line-height: 1.5; }
        
        /* Results Screen */
        .results-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .celebration-emoji {
            font-size: 4rem;
            animation: bounce 0.6s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .score-display {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #20BA58);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.6);
        }

        #options-box {
            gap: 6px !important;
        }

        #quiz-area {
            padding: 0 8px;
        }

        .glass-panel {
            padding: 16px !important;
        }

        #q-text {
            margin-bottom: 8px !important;
            font-size: 1.5rem !important;
        }

        #exp-box {
            margin-top: 12px !important;
            padding: 12px !important;
            font-size: 0.85rem;
        }

        #btn-next {
            margin-top: 12px !important;
            padding: 12px !important;
            font-size: 1rem;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="particle-bg" id="particle-container"></div>

    <header class="p-3 flex justify-between items-center bg-white/10 backdrop-blur-md sticky top-0 z-50 border-b border-white/20">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full border-2 border-white overflow-hidden bg-white/20">
                <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=BE&background=667eea&color=fff';">
            </div>
            <div>
                <h1 class="text-lg font-black text-white uppercase tracking-tight">Bel-Engleezi</h1>
                <p class="text-white/80 text-[8px] font-bold tracking-wide uppercase mt-[-2px]">Academy</p>
            </div>
        </div>
        <div id="timer" class="hidden font-mono text-lg text-white border border-white/30 px-3 py-1 rounded-full bg-white/10">30:00</div>
    </header>

    <main class="min-h-[85vh] flex items-center justify-center p-3">
        <div id="start-screen" class="glass-panel p-6 rounded-3xl max-w-sm w-full border-t-4 border-white/50">
            <h2 class="text-2xl font-black text-center mb-4">Student Entry</h2>
            <div class="space-y-3" dir="rtl">
                <input type="text" id="u-name" placeholder="الاسم بالكامل" class="w-full bg-white/10 p-3 rounded-lg border border-white/30 focus:border-white text-center text-white outline-none placeholder:text-white/50 text-sm">
                <select id="u-age" class="w-full p-3 rounded-lg border border-white/30 focus:border-white text-center outline-none text-sm">
                    <option value="" disabled selected style="color: gray;">المرحلة العمرية</option>
                    <option value="Under 20">أقل من 20 سنة</option>
                    <option value="Over 20">أكبر من 20 سنة</option>
                </select>
                <select id="u-gender" class="w-full p-3 rounded-lg border border-white/30 focus:border-white text-center outline-none text-sm">
                    <option value="" disabled selected style="color: gray;">النوع</option>
                    <option value="Male">ذكر</option>
                    <option value="Female">أنثى</option>
                </select>
            </div>
            <button onclick="startApp()" class="w-full mt-6 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black text-lg py-3 rounded-lg hover:shadow-lg transition-all">ابدأ التحدي 🚀</button>
        </div>

        <div id="quiz-area" class="hidden max-w-lg w-full">
            <div class="flex items-center gap-3 mb-4 glass-panel p-2 rounded-xl">
                <div class="flex-grow h-2 bg-white/20 rounded-full overflow-hidden">
                    <div id="prog-bar" class="h-full bg-gradient-to-r from-purple-400 to-pink-400 w-0 transition-all duration-500"></div>
                </div>
                <span id="q-num" class="font-black text-white text-sm tracking-widest">01/25</span>
            </div>

            <div class="glass-panel rounded-2xl min-h-auto flex flex-col justify-start">
                <h2 id="q-text" class="text-xl font-bold text-white leading-snug text-center"></h2>
                
                <div id="tool-listen" class="hidden text-center mb-3">
                    <button onclick="playAudio()" class="bg-white/10 text-white border border-white/30 px-6 py-2 rounded-full font-bold text-sm hover:bg-white/20 transition-all">🔊 استمع</button>
                </div>
                <div id="tool-read" class="hidden mb-3 bg-white/5 p-3 rounded-lg border-l-4 border-white/50 text-white italic text-xs max-h-24 overflow-y-auto"></div>
                
                <div id="tool-magic" class="hidden"></div>

                <div id="options-box" class="grid grid-cols-1 mt-3"></div>
                
                <div id="exp-box" class="hidden rounded-lg border text-right font-medium leading-relaxed border-white/30 bg-white/5"></div>

                <button id="btn-next" onclick="nextQ()" class="hidden w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg font-black text-base hover:shadow-lg transition-all">السؤال التالي ⮕</button>
            </div>
        </div>
    </main>

    <!-- Countdown Overlay -->
    <div id="countdown-overlay" class="hidden countdown-overlay">
        <div class="countdown-box">
            <div class="text-2xl font-bold mb-3 text-white">خذ نفس عميق وركز</div>
            <div class="countdown-timer" id="countdown-number">5</div>
            <div class="text-lg text-white/80">استعد للعبة</div>
        </div>
    </div>

    <script>
        // Create Particle Background
        function createParticles() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 20) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Sound System
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx;
        function snd(t) {
            try {
                if(!actx) actx = new AudioContext();
                const o = actx.createOscillator(), g = actx.createGain();
                o.connect(g); g.connect(actx.destination);
                let n = actx.currentTime;
                if(t==='ok'){ 
                    o.frequency.setValueAtTime(600,n); 
                    o.frequency.setValueAtTime(800,n+0.1); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.2); 
                }
                if(t==='err'){ 
                    o.frequency.setValueAtTime(200,n); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.3); 
                }
            } catch(e){}
        }

        // Anti-Cheating System
        function generateSecureHash(name, score, timestamp) {
            let data = `${name}|${score}|${timestamp}|BEL2024SECURE`;
            let hash = 0;
            for(let i = 0; i < data.length; i++) {
                let char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        // 25 Quality Questions
        const BANK = [
            { type: "choice", q: "Which of these is the most 'Elite' way to react when you don't understand a native speaker?", a: ["Say 'What?' repeatedly", "Nod and pretend to understand", "Ask politely for clarification: 'Could you rephrase that?'", "Stay silent and walk away"], c: 2, exp: "الشخص الواثق (Elite) لا يخجل من طلب التوضيح؛ طلب إعادة صياغة الجملة يعكس احترافية وذكاء اجتماعي." },
            { type: "grammar", q: "The CEO __________ that the merger be finalized by the end of the fiscal year.", a: ["insists", "insisted", "insist", "is insisting"], c: 2, exp: "نستخدم هنا صيغة (Subjunctive) بعد أفعال الطلب والإصرار؛ لذا نستخدم المصدر (insist)." },
            { type: "listening", text: "The volatility of the market has reached an unprecedented level, necessitating a shift in our long-term investment strategy.", q: "What is the speaker's main concern?", a: ["Low profits", "Market stability", "Market volatility", "Employee performance"], c: 2, exp: "المتحدث قلق من 'volatility' أي التقلب وعدم استقرار السوق." },
            { type: "choice", q: "Choose the synonym for 'Meticulous':", a: ["Careless", "Thorough", "Speedy", "Aggressive"], c: 1, exp: "كلمة 'Meticulous' تعني شديد الدقة والاهتمام بالتفاصيل." },
            { type: "memory", q: "ابحث عن كلمة 'Margin'", words: ["💰 Revenue", "📈 Profit", "📉 Loss", "💵 Margin"], target: "Margin", exp: "⭐ ممتاز! 'Margin' = الهامش الربحي" },
            { type: "grammar", q: "Hardly __________ the meeting started when the fire alarm went off.", a: ["did", "has", "had", "was"], c: 2, exp: "عند البدء بـ 'Hardly' نستخدم صيغة الاستفهام في الماضي التام." },
            { type: "reading", passage: "The concept of 'Deep Work' involves focusing without distraction on a cognitively demanding task. It is a superpower in our increasingly competitive economy.", q: "According to the text, 'Deep Work' is defined as:", a: ["Working in a basement", "Focusing without distraction", "Working long hours", "Multitasking"], c: 1, exp: "النص يعرف 'Deep Work' بأنه التركيز العميق بدون أي تشتت." },
            { type: "listening", text: "If we don't curb our carbon emissions immediately, the irreversible damage to the biosphere will compromise future generations.", q: "What is the urgent action required?", a: ["Increase production", "Curb carbon emissions", "Plant more trees", "Ignore"], c: 1, exp: "الإجراء العاجل هو 'Curb emissions' أي تقليل انبعاثات الكربون." },
            { type: "grammar", q: "If they __________ more attention to the contract, they wouldn't be in trouble.", a: ["paid", "have paid", "had paid", "would pay"], c: 2, exp: "هذه حالة (Third Conditional) تعبر عن ندم في الماضي." },
            { type: "choice", q: "Identify the idiom that means 'to fail completely':", a: ["Break a leg", "Hit the books", "Go down in flames", "Piece of cake"], c: 2, exp: "'Go down in flames' يستخدم لوصف الفشل الذريع." },
            { type: "memory", q: "ابحث عن كلمة 'Resilient'", words: ["🎯 Agile", "💪 Resilient", "🛑 Stagnant", "🏋️ Robust"], target: "Resilient", exp: "🌟 برافو! 'Resilient' = المرونة والقدرة على التعافي" },
            { type: "listening", text: "I'd like to emphasize that the budget allocation for research and development is non-negotiable.", q: "What is 'non-negotiable'?", a: ["Marketing", "Salaries", "R&D", "Rent"], c: 2, exp: "المتحدث يؤكد أن ميزانية (R&D) غير قابلة للتفاوض." },
            { type: "reading", passage: "In a 'Red Ocean' strategy, companies compete fiercely. This leads to cutthroat competition and lower profits.", q: "What characterizes a 'Red Ocean'?", a: ["New opportunities", "No competitors", "Cutthroat competition", "Low demand"], c: 2, exp: "'Red Ocean' = المنافسة الشرسة على طلب محدود." },
            { type: "grammar", q: "She acts as if she __________ the project herself.", a: ["completed", "had completed", "has completed", "completes"], c: 1, exp: "نستخدم 'had completed' في جملة 'as if' للتعبير عن حالة ��ير حقيقية." },
            { type: "choice", q: "What does 'paradigm shift' mean?", a: ["A small change", "A fundamental change in perspective", "Moving offices", "Learning software"], c: 1, exp: "'Paradigm shift' = تغيير أساسي جذري في طريقة التفكير." },
            { type: "memory", q: "ابحث عن كلمة 'Eloquent'", words: ["📚 Diligent", "😴 Negligent", "⚡ Urgent", "🎤 Eloquent"], target: "Eloquent", exp: "✨ رائع! 'Eloquent' = الفصاحة والبلاغة" },
            { type: "listening", text: "The implementation of AI in healthcare has revolutionized diagnostic accuracy.", q: "What has been revolutionized?", a: ["Patient comfort", "Hospital buildings", "Diagnostic accuracy", "Uniforms"], c: 2, exp: "AI طوّر من دقة التشخيص (Diagnostic accuracy) بشكل ثوري." },
            { type: "reading", passage: "Emotional intelligence (EQ) is the ability to manage emotions. It's often more important than IQ.", q: "Why is EQ important?", a: ["Increases IQ", "Manages emotions effectively", "Improves memory", "Guarantees wealth"], c: 1, exp: "الذكاء العاطفي يساعد في إدارة العواطف وبناء علاقات أفضل." },
            { type: "grammar", q: "Not only __________ she fluent in three languages, but also has a Ph.D.", a: ["is", "was", "are", "has"], c: 0, exp: "عند 'Not only' نستخدم الاستفهام و'is' صحيحة لـ 'she'." },
            { type: "choice", q: "What is a 'blue ocean' strategy?", a: ["Competitive markets", "Creating uncontested spaces", "Reducing prices", "Following competitors"], c: 1, exp: "'Blue Ocean' = إيجاد أسواق جديدة غير منافسة." },
            { type: "memory", q: "ابحث عن كلمة 'Procrastinate'", words: ["💪 Persevere", "⏰ Procrastinate", "🤝 Facilitate", "🚀 Accelerate"], target: "Procrastinate", exp: "👍 متقن! 'Procrastinate' = التأجيل والتسويف" },
            { type: "listening", text: "The entrepreneur's failure was a stepping stone to unprecedented success.", q: "How did they view failure?", a: ["Permanent loss", "Stepping stone", "Reason to quit", "Irrelevant"], c: 1, exp: "الرائد اعتبر الفشل 'stepping stone' للنجاح وليس نهاية." },
            { type: "reading", passage: "The circular economy aims to eliminate waste by keeping materials in use. It contrasts with 'take-make-dispose'.", q: "What is the goal?", a: ["Increase profits", "Eliminate waste and maximize use", "Create jobs", "Replace factories"], c: 1, exp: "الاقتصاد الدائري يهدف للقضاء على الهدر والاستفادة القصوى." },
            { type: "grammar", q: "The government recommended that every citizen __________ vaccinated.", a: ["be", "been", "was", "were"], c: 0, exp: "بعد 'recommend that' نستخدم الـ Subjunctive mood مع 'be'." },
            { type: "choice", q: "Which phrase means 'understand thoroughly'?", a: ["Grasp the concept", "Lose the thread", "Miss the point", "Beat around"], c: 0, exp: "'Grasp the concept' = فهم شامل ومستديم للفكرة." }
        ];

        let state = { idx: 0, score: 0, locked: false, user: {}, time: 1800, memoryTimeout: null, inMemory: false };

        function startApp() {
            let n = document.getElementById('u-name').value, a = document.getElementById('u-age').value, g = document.getElementById('u-gender').value;
            if(!n || !a || !g) return alert("برجاء إكمال البيا��ات!");
            state.user = { n, a, g };
            snd('ok');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('timer').classList.remove('hidden');
            loadQ();
            startTimer();
        }

        function startTimer() {
            setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60), s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                if(state.time <= 0) endQuiz();
            }, 1000);
        }

        function loadQ() {
            state.locked = false;
            state.inMemory = false;
            if(state.memoryTimeout) clearTimeout(state.memoryTimeout);
            
            // Clear all previous content
            ['tool-listen','tool-read','tool-magic','btn-next','exp-box'].forEach(id => {
                let el = document.getElementById(id);
                el.classList.add('hidden');
                if(id === 'tool-magic') el.innerHTML = '';
            });
            document.getElementById('options-box').innerHTML = "";
            
            let q = BANK[state.idx];
            document.getElementById('q-num').innerText = `${(state.idx+1).toString().padStart(2,'0')}/25`;
            document.getElementById('prog-bar').style.width = `${((state.idx+1)/25)*100}%`;
            
            // For memory questions: don't show question yet
            if(q.type === 'memory') {
                document.getElementById('q-text').innerText = '';
                runMemory(q);
            } else {
                // For other questions: show question immediately
                document.getElementById('q-text').innerText = q.q || "";
                
                if(q.type==='listening') document.getElementById('tool-listen').classList.remove('hidden');
                if(q.type==='reading') {
                    document.getElementById('tool-read').innerText = q.passage;
                    document.getElementById('tool-read').classList.remove('hidden');
                }

                if(q.a) {
                    q.a.forEach((opt, i) => {
                        let b = document.createElement('button');
                        b.className = "opt-btn w-full bg-white/5 rounded-lg text-white font-bold";
                        b.innerText = opt;
                        b.onclick = () => check(i, q.c, b, q.exp);
                        document.getElementById('options-box').appendChild(b);
                    });
                }
            }
        }

        function playAudio() {
            let u = new SpeechSynthesisUtterance(BANK[state.idx].text);
            u.lang = 'en-US';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function check(idx, correct, btn, exp) {
            if(state.locked) return;
            state.locked = true;
            let btns = document.querySelectorAll('.opt-btn');
            let isCorrect = idx === correct;
            
            if(isCorrect) {
                snd('ok');
                state.score++;
                btn.classList.add('opt-correct');
            } else {
                snd('err');
                btn.classList.add('opt-wrong');
                btns[correct].classList.add('opt-correct');
            }
            btns.forEach(b => b.disabled = true);
            let eb = document.getElementById('exp-box');
            eb.innerHTML = `<strong class="text-white">📝 التفسير:</strong><br><span class="exp-text">${exp}</span>`;
            eb.className = `rounded-lg border text-right font-medium leading-relaxed block p-2 ${isCorrect?'bg-green-500/20 border-green-400/50':'bg-red-500/20 border-red-400/50'}`;
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function runMemory(q) {
            state.inMemory = true;
            document.getElementById('countdown-overlay').classList.remove('hidden');
            
            let countdown = 5;
            const countdownNumber = document.getElementById('countdown-number');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                countdownNumber.innerText = countdown;
                if(countdown === 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown-overlay').classList.add('hidden');
                    
                    // Show question after countdown
                    document.getElementById('q-text').innerText = q.q;
                    
                    // Show and flip cards
                    let tool = document.getElementById('tool-magic');
                    tool.classList.remove('hidden');
                    tool.innerHTML = "";
                    let cards = [];
                    q.words.forEach((w, i) => {
                        let c = document.createElement('div');
                        c.className = "m-card";
                        c.innerHTML = `<div class="m-card-inner"><div class="m-card-front">${w}</div><div class="m-card-back">BE</div></div>`;
                        tool.appendChild(c);
                        cards.push({el: c, word: w});
                    });
                    
                    state.memoryTimeout = setTimeout(() => {
                        cards.forEach(c => c.el.classList.add('flipped'));
                        cards.forEach(c => {
                            c.el.onclick = () => {
                                if(state.locked) return;
                                state.locked = true;
                                c.el.classList.remove('flipped');
                                let isCorrect = c.word === q.target;
                                
                                if(isCorrect) {
                                    snd('ok');
                                    state.score++;
                                } else {
                                    snd('err');
                                }
                                
                                let eb = document.getElementById('exp-box');
                                eb.innerHTML = `<strong class="text-white">💡 الذاكرة:</strong><br><span class="exp-text">${q.exp}</span>`;
                                eb.className = `rounded-lg border text-right font-medium leading-relaxed block p-2 ${isCorrect?'bg-blue-500/20 border-blue-400/50':'bg-blue-500/20 border-blue-400/50'}`;
                                document.getElementById('btn-next').classList.remove('hidden');
                            };
                        });
                    }, 2000);
                }
            }, 1000);
        }

        function nextQ() {
            state.idx++;
            if(state.idx < BANK.length) loadQ();
            else endQuiz();
        }

        function endQuiz() {
            let timestamp = Date.now();
            let hash = generateSecureHash(state.user.n, state.score, timestamp);
            let dateStr = new Date(timestamp).toLocaleString('ar-EG');
            
            const messages = [
                "🌟 أنت رائع! استمر في الاجتهاد",
                "💪 عمل رائع! أنت على الطريق الصحيح",
                "✨ بداية رائعة! كن فخوراً بنفسك",
                "🎯 أحسنت! سوف تنجح بتأكيد",
                "🏆 أداء ممتاز! أنت مميز"
            ];
            let randomMsg = messages[Math.floor(Math.random() * messages.length)];
            
            let msgBody = `Bel-Engleezi Result
━━━━━━━━━━
الطالب: ${state.user.n}
النتيجة: ${state.score}/25
السن: ${state.user.a}
الجنس: ${state.user.g}
التوقيت: ${dateStr}
━━━━━━━━━━
🔐 كود التحقق: ${hash}`;
            
            document.body.innerHTML = `
            <div class="fixed inset-0 particle-bg" id="particle-container"></div>
            <div class="relative z-10 h-screen flex flex-col items-center justify-center text-center p-4">
                <div class="glass-panel p-8 rounded-2xl max-w-md w-full">
                    <div class="celebration-emoji">🎉</div>
                    <h1 class="text-3xl font-black text-white mb-3">تم إنهاء الاختبار!</h1>
                    <p class="text-lg text-white/90 mb-4">${randomMsg}</p>
                    <div class="score-display text-3xl">${state.score}/25</div>
                    <p class="text-white/70 mb-6 text-sm">درجتك ممتازة! شارك نتيجتك الآن</p>
                    <button onclick="window.open('https://wa.me/201144576661?text=' + encodeURIComponent('${msgBody}'))" class="whatsapp-btn">
                        <span>📲</span> أرسل النتيجة لـ Mr.Seif
                    </button>
                    <div class="mt-6 text-xs text-white/60">🔐 كود التحقق: <span class="font-mono text-white">${hash}</span></div>
                </div>
            </div>`;
            
            createParticles();
        }
    </script>
</body>
</html>
