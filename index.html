<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bel-Engleezi | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --dark: #0f172a; }
        body { margin: 0; font-family: 'Montserrat', 'Cairo', sans-serif; color: #fff; overflow-x: hidden; user-select: none; }
        
        /* Animated Particle Background */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(251, 191, 36, 0.5);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .opt-btn { transition: all 0.3s; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        .opt-btn:hover:not(:disabled) { transform: scale(1.02); border-color: var(--gold); background: rgba(251, 191, 36, 0.1); }
        .opt-correct { background: #065f46 !important; border-color: #34d399 !important; }
        .opt-wrong { background: #7f1d1d !important; border-color: #f87171 !important; }
        
        /* Memory Cards Fix */
        #tool-magic {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            margin: 20px 0;
        }
        
        .m-card { width: 90px; height: 130px; transition: all 0.5s; cursor: pointer; transform-style: preserve-3d; position: relative; }
        .m-card.flipped .inner { transform: rotateY(180deg); }
        .m-card .inner { position: relative; width: 100%; height: 100%; transition: 0.6s; transform-style: preserve-3d; }
        .m-card .front, .m-card .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--gold); }
        .m-card .front { background: var(--gold); color: #000; padding: 8px; text-align: center; font-size: 0.8rem; }
        .m-card .back { background: #1e293b; color: var(--gold); transform: rotateY(180deg); font-size: 1.8rem; }
        
        .exp-text { color: #34d399; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="particle-bg" id="particle-container"></div>

    <header class="p-4 flex justify-between items-center bg-slate-900/60 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full border-2 border-yellow-500 overflow-hidden bg-white">
                <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=BE&background=fbbf24&color=000';">
            </div>
            <div>
                <h1 class="text-xl font-black text-white uppercase tracking-tighter">Bel-Engleezi</h1>
                <p class="text-yellow-500 text-[10px] font-bold tracking-[0.2em] uppercase mt-[-4px]">Academy</p>
            </div>
        </div>
        <div id="timer" class="hidden font-mono text-xl text-yellow-500 border border-yellow-500/30 px-4 py-1 rounded-full bg-slate-950/50">30:00</div>
    </header>

    <main class="min-h-[85vh] flex items-center justify-center p-4">
        <div id="start-screen" class="glass-panel p-8 rounded-3xl max-w-md w-full border-t-4 border-yellow-500">
            <h2 class="text-3xl font-black text-center mb-6">Student Entry</h2>
            <div class="space-y-4" dir="rtl">
                <input type="text" id="u-name" placeholder="الاسم بالكامل" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-600 focus:border-yellow-500 text-center text-white outline-none">
                <select id="u-age" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-600 text-center text-white outline-none appearance-none">
                    <option value="" disabled selected>المرحلة العمرية</option>
                    <option value="Under 20">أقل من 20 سنة</option>
                    <option value="Over 20">أكبر من 20 سنة</option>
                </select>
                <select id="u-gender" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-600 text-center text-white outline-none appearance-none">
                    <option value="" disabled selected>النوع</option>
                    <option value="Male">ذكر</option>
                    <option value="Female">أنثى</option>
                </select>
            </div>
            <button onclick="startApp()" class="w-full mt-8 bg-yellow-500 text-black font-black text-xl py-4 rounded-xl hover:bg-yellow-400 shadow-lg">ابدأ التحدي 🚀</button>
        </div>

        <div id="quiz-area" class="hidden max-w-4xl w-full">
            <div class="flex items-center gap-4 mb-6 glass-panel p-3 rounded-2xl">
                <div class="flex-grow h-3 bg-slate-800 rounded-full overflow-hidden">
                    <div id="prog-bar" class="h-full bg-yellow-500 w-0 transition-all duration-500"></div>
                </div>
                <span id="q-num" class="font-black text-yellow-500 text-lg tracking-widest">01/25</span>
            </div>

            <div class="glass-panel p-6 sm:p-10 rounded-[2rem] min-h-[600px] flex flex-col justify-start">
                <h2 id="q-text" class="text-2xl font-bold mb-6 text-white leading-relaxed text-center"></h2>
                
                <div id="tool-listen" class="hidden text-center mb-6">
                    <button onclick="playAudio()" class="bg-slate-800 text-yellow-400 border border-yellow-500/50 px-8 py-3 rounded-full font-bold hover:bg-slate-700">🔊 استمع للقطعة الصوتية</button>
                </div>
                <div id="tool-read" class="hidden mb-6 bg-slate-900/80 p-6 rounded-xl border-l-4 border-yellow-500 text-slate-300 italic text-lg max-h-40 overflow-y-auto"></div>
                
                <div id="tool-magic" class="hidden"></div>

                <div id="options-box" class="grid grid-cols-1 gap-4 mt-6"></div>
                
                <div id="exp-box" class="hidden mt-8 p-6 rounded-xl border text-right font-medium leading-relaxed border-yellow-500/50 bg-slate-900/50"></div>

                <button id="btn-next" onclick="nextQ()" class="hidden w-full mt-8 bg-white text-black py-4 rounded-xl font-black text-xl hover:bg-slate-200">السؤال التالي ⮕</button>
            </div>
        </div>
    </main>

    <script>
        // Create Particle Background
        function createParticles() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 20) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Sound System
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx;
        function snd(t) {
            try {
                if(!actx) actx = new AudioContext();
                const o = actx.createOscillator(), g = actx.createGain();
                o.connect(g); g.connect(actx.destination);
                let n = actx.currentTime;
                if(t==='ok'){ o.frequency.setValueAtTime(600,n); o.frequency.setValueAtTime(800,n+0.1); g.gain.setValueAtTime(0.1,n); o.start(n); o.stop(n+0.2); }
                if(t==='err'){ o.frequency.setValueAtTime(200,n); g.gain.setValueAtTime(0.1,n); o.start(n); o.stop(n+0.3); }
            } catch(e){}
        }

        // Anti-Cheating System
        function generateSecureHash(name, score, timestamp) {
            let data = `${name}|${score}|${timestamp}|BEL2024SECURE`;
            let hash = 0;
            for(let i = 0; i < data.length; i++) {
                let char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        // 25 Quality Questions (NO WRITING)
        const BANK = [
            { type: "choice", q: "Which of these is the most 'Elite' way to react when you don't understand a native speaker?", a: ["Say 'What?' repeatedly", "Nod and pretend to understand", "Ask politely for clarification: 'Could you rephrase that?'", "Stay silent and walk away"], c: 2, exp: "الشخص الواثق (Elite) لا يخجل من طلب التوضيح؛ طلب إعادة صياغة الجملة يعكس احترافية وذكاء اجتماعي." },
            { type: "grammar", q: "The CEO __________ that the merger be finalized by the end of the fiscal year.", a: ["insists", "insisted", "insist", "is insisting"], c: 2, exp: "نستخدم هنا صيغة (Subjunctive) بعد أفعال الطلب والإصرار؛ لذا نستخدم المصدر (insist)." },
            { type: "listening", text: "The volatility of the market has reached an unprecedented level, necessitating a shift in our long-term investment strategy.", q: "What is the speaker's main concern?", a: ["Low profits", "Market stability", "Market volatility", "Employee performance"], c: 2, exp: "المتحدث قلق من 'volatility' أي التقلب وعدم استقرار السوق، مما يستدعي تغيير الاستراتيجية." },
            { type: "choice", q: "Choose the synonym for 'Meticulous':", a: ["Careless", "Thorough", "Speedy", "Aggressive"], c: 1, exp: "كلمة 'Meticulous' تعني شديد الدقة والاهتمام بالتفاصيل، ومرادفها 'Thorough'." },
            { type: "memory", q: "ابحث عن كلمة 'Margin'", words: ["Revenue", "Profit", "Loss", "Margin"], target: "Margin", exp: "اختبار الذاكرة: 'Margin' تعني الهامش الربحي" },
            { type: "grammar", q: "Hardly __________ the meeting started when the fire alarm went off.", a: ["did", "has", "had", "was"], c: 2, exp: "عند البدء بـ 'Hardly' نستخدم صيغة الاستفهام في الماضي التام (Had + Subject)." },
            { type: "reading", passage: "The concept of 'Deep Work' involves focusing without distraction on a cognitively demanding task. It is a superpower in our increasingly competitive economy.", q: "According to the text, 'Deep Work' is defined as:", a: ["Working in a basement", "Focusing without distraction", "Working long hours", "Multitasking"], c: 1, exp: "النص يعرف 'Deep Work' بأنه التركيز العميق بدون أي تشتت لإنجاز مهام معقدة." },
            { type: "listening", text: "If we don't curb our carbon emissions immediately, the irreversible damage to the biosphere will compromise future generations.", q: "What is the urgent action required?", a: ["Increase production", "Curb carbon emissions", "Plant more trees", "Ignore the biosphere"], c: 1, exp: "الإجراء العاجل هو 'Curb emissions' أي كبح وتقليل انبعاثات الكربون فوراً." },
            { type: "grammar", q: "If they __________ more attention to the contract, they wouldn't be in this legal trouble now.", a: ["paid", "have paid", "had paid", "would pay"], c: 2, exp: "هذه حالة (Third Conditional) تعبر عن ندم في الماضي؛ نستخدم (If + Past Perfect)." },
            { type: "choice", q: "Identify the idiom that means 'to fail completely':", a: ["Break a leg", "Hit the books", "Go down in flames", "Piece of cake"], c: 2, exp: "تعبير 'Go down in flames' يستخدم لوصف الفشل الذريع والمفاجئ." },
            { type: "memory", q: "ابحث عن كلمة 'Resilient'", words: ["Agile", "Resilient", "Stagnant", "Robust"], target: "Resilient", exp: "اختبار الذاكرة: 'Resilient' تعني المرونة والقدرة على التعافي" },
            { type: "listening", text: "I'd like to emphasize that the budget allocation for research and development is non-negotiable.", q: "What part of the budget is 'non-negotiable'?", a: ["Marketing", "Salaries", "R&D", "Rent"], c: 2, exp: "المتحدث يؤكد أن ميزانية البحث والتطوير (R&D) غير قابلة للتفاوض." },
            { type: "reading", passage: "In a 'Red Ocean' strategy, companies try to outperform their rivals to grab a greater share of existing demand. This leads to cutthroat competition.", q: "What characterizes a 'Red Ocean' market?", a: ["New opportunities", "No competitors", "Cutthroat competition", "Low demand"], c: 2, exp: "السوق 'Red Ocean' يتميز بالمنافسة الشرسة بين الشركات على طلب محدود." },
            { type: "grammar", q: "She acts as if she __________ the project herself, though she merely supervised.", a: ["completed", "had completed", "has completed", "completes"], c: 1, exp: "نستخدم 'had completed' في جملة 'as if' للتعبير عن حالة غير حقيقية في الماضي." },
            { type: "choice", q: "What does 'paradigm shift' mean?", a: ["A small change", "A fundamental change in perspective", "Moving to a new office", "Learning new software"], c: 1, exp: "'Paradigm shift' يعني تغييراً أساسياً جذرياً في طريقة التفكير والنموذج." },
            { type: "memory", q: "ابحث عن كلمة 'Eloquent'", words: ["Diligent", "Negligent", "Urgent", "Eloquent"], target: "Eloquent", exp: "اختبار الذاكرة: 'Eloquent' تعني الفصاحة والبلاغة" },
            { type: "listening", text: "The implementation of artificial intelligence in healthcare has revolutionized diagnostic accuracy.", q: "What has been revolutionized by AI in healthcare?", a: ["Patient comfort", "Hospital buildings", "Diagnostic accuracy", "Staff uniforms"], c: 2, exp: "AI في المجال الطبي طوّر بشكل ثوري من دقة التشخيص (Diagnostic accuracy)." },
            { type: "reading", passage: "Emotional intelligence (EQ) is the ability to recognize, understand, and manage emotions. It's often considered more important than IQ for success.", q: "Why might EQ be important?", a: ["It increases IQ", "It helps manage emotions effectively", "It improves memory", "It guarantees wealth"], c: 1, exp: "الذكاء العاطفي مهم لأنه يساعد في إدارة العواطف بفعالية وبناء علاقات أفضل." },
            { type: "grammar", q: "Not only __________ she fluent in three languages, but she also has a Ph.D. in linguistics.", a: ["is", "was", "are", "has"], c: 0, exp: "عند البدء بـ 'Not only' نستخدم الاستفهام، و 'is' هي الصحيحة لـ 'she'." },
            { type: "choice", q: "What is a 'blue ocean' strategy?", a: ["Operating in competitive markets", "Creating uncontested market spaces", "Reducing prices", "Following competitors"], c: 1, exp: "'Blue Ocean' تعني إيجاد أسواق جديدة غير منافسة بدلاً من المنافسة الشرسة." },
            { type: "memory", q: "ابحث عن كلمة 'Procrastinate'", words: ["Persevere", "Procrastinate", "Facilitate", "Accelerate"], target: "Procrastinate", exp: "اختبار الذاكرة: 'Procrastinate' تعني التأجيل والتسويف" },
            { type: "listening", text: "The entrepreneur's failure wasn't a setback but a stepping stone to unprecedented success.", q: "How did the entrepreneur view their failure?", a: ["As a permanent loss", "As a stepping stone to success", "As reason to quit", "As irrelevant"], c: 1, exp: "الرائد لم يعتبر الفشل نهاية بل 'stepping stone' أي درجة للصعود للنجاح." },
            { type: "reading", passage: "The circular economy aims to eliminate waste by keeping products and materials in use for as long as possible. It contrasts sharply with the linear 'take-make-dispose' model.", q: "What is the main goal of the circular economy?", a: ["To increase profits", "To eliminate waste and maximize resource use", "To create new jobs", "To replace factories"], c: 1, exp: "الاقتصاد الدائري يهدف للقضاء على الهدر والاستفادة القصوى من الموارد." },
            { type: "grammar", q: "The government recommended that every citizen __________ vaccinated against the virus.", a: ["be", "been", "was", "were"], c: 0, exp: "بعد 'recommend that' نستخدم الـ Subjunctive mood مع المصدر الأساسي 'be'." },
            { type: "choice", q: "Which phrase means 'to understand thoroughly'?", a: ["Grasp the concept", "Lose the thread", "Miss the point", "Beat around the bush"], c: 0, exp: "'Grasp the concept' يعني فهم مستديم وشامل للفكرة أو المفهوم." }
        ];

        let state = { idx: 0, score: 0, locked: false, user: {}, time: 1800, memoryTimeout: null };

        function startApp() {
            let n = document.getElementById('u-name').value, a = document.getElementById('u-age').value, g = document.getElementById('u-gender').value;
            if(!n || !a || !g) return alert("برجاء إكمال البيانات!");
            state.user = { n, a, g };
            snd('ok');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('timer').classList.remove('hidden');
            loadQ();
            startTimer();
        }

        function startTimer() {
            setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60), s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                if(state.time <= 0) endQuiz();
            }, 1000);
        }

        function loadQ() {
            state.locked = false;
            if(state.memoryTimeout) clearTimeout(state.memoryTimeout);
            let q = BANK[state.idx];
            document.getElementById('q-num').innerText = `${(state.idx+1).toString().padStart(2,'0')}/25`;
            document.getElementById('prog-bar').style.width = `${((state.idx+1)/25)*100}%`;
            ['tool-listen','tool-read','tool-magic','btn-next','exp-box'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('options-box').innerHTML = "";
            document.getElementById('q-text').innerText = q.q || "";

            if(q.type==='listening') document.getElementById('tool-listen').classList.remove('hidden');
            if(q.type==='reading') {
                document.getElementById('tool-read').innerText = q.passage;
                document.getElementById('tool-read').classList.remove('hidden');
            }
            if(q.type==='memory') runMemory(q);

            if(q.a) {
                q.a.forEach((opt, i) => {
                    let b = document.createElement('button');
                    b.className = "opt-btn w-full bg-slate-800/80 p-5 rounded-xl text-lg font-bold text-white";
                    b.innerText = opt;
                    b.onclick = () => check(i, q.c, b, q.exp);
                    document.getElementById('options-box').appendChild(b);
                });
            }
        }

        function playAudio() {
            let u = new SpeechSynthesisUtterance(BANK[state.idx].text);
            u.lang = 'en-US';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function check(idx, correct, btn, exp) {
            if(state.locked) return;
            state.locked = true;
            let btns = document.querySelectorAll('.opt-btn');
            if(idx === correct) {
                snd('ok');
                state.score++;
                btn.classList.add('opt-correct');
            } else {
                snd('err');
                btn.classList.add('opt-wrong');
                btns[correct].classList.add('opt-correct');
            }
            btns.forEach(b => b.disabled = true);
            let eb = document.getElementById('exp-box');
            eb.innerHTML = `<strong class="text-yellow-500">📝 التفسير:</strong><br><span class="exp-text">${exp}</span>`;
            eb.className = `mt-8 p-6 rounded-xl border text-right font-medium leading-relaxed block ${idx===correct?'bg-emerald-900/30 border-emerald-500':'bg-red-900/30 border-red-500'}`;
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function runMemory(q) {
            let tool = document.getElementById('tool-magic');
            tool.classList.remove('hidden');
            tool.innerHTML = "";
            let cards = [];
            q.words.forEach((w, i) => {
                let c = document.createElement('div');
                c.className = "m-card";
                c.innerHTML = `<div class="inner"><div class="front">${w}</div><div class="back">?</div></div>`;
                tool.appendChild(c);
                cards.push({el: c, word: w});
            });
            
            state.memoryTimeout = setTimeout(() => {
                cards.forEach(c => c.el.classList.add('flipped'));
                cards.forEach(c => {
                    c.el.onclick = () => {
                        if(state.locked) return;
                        state.locked = true;
                        c.el.classList.remove('flipped');
                        if(c.word === q.target) {
                            snd('ok');
                            state.score++;
                        } else snd('err');
                        let eb = document.getElementById('exp-box');
                        eb.innerHTML = `<strong class="text-yellow-500">💡 الذاكرة:</strong><br><span class="exp-text">${q.exp}</span>`;
                        eb.className = 'mt-8 p-6 rounded-xl border text-right font-medium leading-relaxed block bg-blue-900/30 border-blue-500';
                        document.getElementById('btn-next').classList.remove('hidden');
                    };
                });
            }, 2000);
        }

        function nextQ() {
            state.idx++;
            if(state.idx < BANK.length) loadQ();
            else endQuiz();
        }

        function endQuiz() {
            let timestamp = Date.now();
            let hash = generateSecureHash(state.user.n, state.score, timestamp);
            let dateStr = new Date(timestamp).toLocaleString('ar-EG');
            let msg = `*Bel-Engleezi Result*%0A━━━━━━━━━━%0Aالطالب: ${state.user.n}%0Aالنتيجة: ${state.score}/25%0Aالسن: ${state.user.a}%0Aالجنس: ${state.user.g}%0Aالتوقيت: ${dateStr}%0A━━━━━━━━━━%0A🔐 كود التحقق: ${hash}`;
            window.open(`https://wa.me/201144576661?text=${msg}`);
            document.body.innerHTML = `<div class="h-screen flex flex-col items-center justify-center text-center bg-gradient-to-br from-slate-900 to-slate-800"><div class="text-4xl font-black text-yellow-500 mb-4">✅ تم إنهاء الاختبار</div><div class="text-2xl text-white mb-2">نتيجتك: <span class="text-yellow-400">${state.score}/25</span></div><div class="text-lg text-slate-300 mb-6">تم إرسالها للأكاديمية</div><div class="text-sm text-slate-400">🔐 كود التحقق: <span class="font-mono text-yellow-500">${hash}</span></div></div>`;
        }
    </script>
</body>
</html>
