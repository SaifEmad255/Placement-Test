<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bel-Engleezi | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; 
            padding: 0;
            font-family: 'Montserrat', 'Cairo', sans-serif; 
            color: #fff; 
            background: linear-gradient(135deg, #0f1b3c 0%, #1a2850 50%, #0f1b3c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Female Vibrant Colors */
        body.female-under20, body.female-over20 {
            background: linear-gradient(-45deg, #ff1493, #ff69b4, #ff87ce, #ffb6d9, #ffc0cb) !important;
            background-size: 400% 400%;
            background-attachment: fixed !important;
            animation: gradientShift 15s ease infinite;
        }
        
        /* Male Vibrant Colors */
        body.male-under20, body.male-over20 {
            background: linear-gradient(-45deg, #1e90ff, #00bfff, #00ced1, #20b2aa, #87ceeb) !important;
            background-size: 400% 400%;
            background-attachment: fixed !important;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: float 25s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        
        .glass-panel { 
            background: linear-gradient(135deg, rgba(15, 27, 60, 0.92), rgba(26, 40, 80, 0.88));
            backdrop-filter: blur(25px);
            border: 2px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(212, 175, 55, 0.2), 0 0 30px rgba(212, 175, 55, 0.12);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            padding: 40px;
        }

        @keyframes slideInForm {
            from { opacity: 0; transform: translateY(-60px) scale(0.85); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
        }

        #start-screen {
            animation: slideInForm 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            max-width: 450px;
            margin: auto;
        }

        @keyframes slideInQuiz {
            from { opacity: 0; transform: translateY(40px) scale(0.95) rotateX(-20deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
        }

        #quiz-area {
            animation: slideInQuiz 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 600px;
            margin: auto;
            padding: 0 16px;
        }

        @keyframes cardFlip {
            0% { opacity: 0; transform: rotateY(90deg) scale(0.9); }
            50% { transform: rotateY(45deg) scale(0.95); }
            100% { opacity: 1; transform: rotateY(0deg) scale(1); }
        }

        #quiz-area .glass-panel {
            animation: cardFlip 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes questionBounce {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            50% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        #q-text {
            animation: questionBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes optionsSlideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #options-box {
            animation: optionsSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        select, input {
            width: 100% !important;
            background-color: rgba(212, 175, 55, 0.1) !important;
            color: #d4af37 !important;
            font-weight: 600 !important;
            border: 2px solid rgba(212, 175, 55, 0.3) !important;
            border-radius: 8px !important;
            padding: 12px !important;
            outline: none !important;
        }

        select option { background: #1a2850; color: #d4af37; }
        input::placeholder { color: rgba(212, 175, 55, 0.6) !important; }

        select:focus, input:focus {
            border-color: rgba(212, 175, 55, 0.6) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3) !important;
        }

        .start-btn {
            width: 100%;
            margin-top: 40px;
            background: linear-gradient(135deg, #d4af37, #e5c158);
            color: #0f1b3c;
            font-weight: 900;
            font-size: 1.125rem;
            padding: 16px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .start-btn:hover::before {
            width: 500px;
            height: 500px;
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
        }

        .start-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .opt-btn { 
            transition: all 0.4s ease;
            border: 2px solid rgba(212, 175, 55, 0.4);
            cursor: pointer; 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(212, 175, 55, 0.04));
            padding: 13px 16px;
            margin: 5px 0;
            position: relative;
            overflow: hidden;
            color: #fff;
            font-weight: 600;
            border-radius: 12px;
            text-align: left;
            width: 100%;
            animation: optionSlide 0.5s ease forwards;
        }

        @keyframes optionSlide {
            from { opacity: 0; transform: translateX(-30px) rotateY(-90deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0deg); }
        }

        .opt-btn:nth-child(1) { animation-delay: 0s; }
        .opt-btn:nth-child(2) { animation-delay: 0.1s; }
        .opt-btn:nth-child(3) { animation-delay: 0.2s; }
        .opt-btn:nth-child(4) { animation-delay: 0.3s; }
        
        .opt-btn:hover:not(:disabled) { 
            transform: scale(1.08) translateY(-2px);
            border-color: rgba(212, 175, 55, 0.8);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.08));
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }
        
        .opt-correct { 
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.25), rgba(16, 185, 129, 0.15)) !important;
            border-color: #10b981 !important;
            animation: correctPulseAnim 0.6s ease-out;
            box-shadow: 0 0 25px rgba(52, 211, 153, 0.4) !important;
        }

        @keyframes correctPulseAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        
        .opt-wrong { 
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.25), rgba(239, 68, 68, 0.15)) !important;
            border-color: #ef4444 !important;
            animation: wrongShakeAnim 0.5s ease-out;
            box-shadow: 0 0 25px rgba(248, 113, 113, 0.4) !important;
        }

        @keyframes wrongShakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        #tool-magic {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            margin: 25px 0;
            min-height: 160px;
            animation: memoryAppear 0.8s ease;
        }

        @keyframes memoryAppear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .countdown-timer {
            font-size: 6.5rem;
            font-weight: 900;
            margin: 20px 0;
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 215, 0, 0.4);
            animation: countdownPulse 1s ease-in-out infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .m-card {
            width: 95px;
            height: 135px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.7s ease;
            position: relative;
            animation: cardEnter 0.6s ease;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) rotateX(-90deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }
        
        .m-card:hover:not(.flipped) {
            transform: translateY(-10px) rotateY(5deg);
        }
        
        .m-card.flipped {
            transform: rotateY(180deg);
        }
        
        .m-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s;
            transform-style: preserve-3d;
        }
        
        .m-card-front, .m-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 3px solid rgba(212, 175, 55, 0.5);
            font-size: 0.7rem;
            padding: 8px;
            text-align: center;
            line-height: 1.1;
        }
        
        .m-card-front {
            background: linear-gradient(135deg, #0f1b3c, #1a2850);
            color: #d4af37;
            box-shadow: inset 0 1px 0 rgba(212, 175, 55, 0.3), 0 0 15px rgba(212, 175, 55, 0.2);
        }
        
        .m-card-back {
            background: linear-gradient(135deg, #d4af37, #e5c158);
            color: #0f1b3c;
            transform: rotateY(180deg);
            font-size: 2.2rem;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }
        
        .m-card.found .m-card-back {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.8);
            animation: matchSuccess 0.6s ease;
        }

        @keyframes matchSuccess {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.15); }
            100% { transform: rotateY(180deg) scale(1); }
        }
        
        #q-text {
            font-size: 1.35rem;
            line-height: 1.5;
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-weight: 700;
            text-align: center;
        }

        #exp-box {
            margin-top: 14px;
            padding: 16px;
            font-size: 0.85rem;
            color: #fff;
            border-radius: 12px;
            text-align: right;
            border: 2px solid rgba(212, 175, 55, 0.3);
            animation: expandAnim 0.5s ease;
        }

        @keyframes expandAnim {
            from { opacity: 0; max-height: 0; transform: translateY(-10px); }
            to { opacity: 1; max-height: 400px; transform: translateY(0); }
        }

        #btn-next {
            margin-top: 16px;
            padding: 13px;
            font-size: 1rem;
            background: linear-gradient(135deg, #d4af37, #e5c158);
            color: #0f1b3c;
            font-weight: 900;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            animation: nextBtnAppear 0.5s ease;
        }

        @keyframes nextBtnAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #btn-next:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.5);
        }

        #tool-listen button {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            border: 2px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: buttonPop 0.4s ease;
        }

        @keyframes buttonPop {
            0% { opacity: 0; transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        #tool-listen button:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.35), rgba(212, 175, 55, 0.2));
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.08);
        }

        #tool-read {
            color: #fff;
            border: 2px solid rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            max-height: 150px;
            overflow-y: auto;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); max-height: 0; }
            to { opacity: 1; transform: translateY(0); max-height: 150px; }
        }

        header {
            background: linear-gradient(135deg, rgba(15, 27, 60, 0.85), rgba(26, 40, 80, 0.85));
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        h1, h2, label {
            color: #d4af37;
        }

        main {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #options-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .space-y-5 > * + * {
            margin-top: 1.25rem;
        }
    </style>
</head>

    <script>
        function createParticles() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 25 + 's';
                particle.style.animationDuration = (20 + Math.random() * 25) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx;
        function snd(t) {
            try {
                if(!actx) actx = new AudioContext();
                const o = actx.createOscillator(), g = actx.createGain();
                o.connect(g); g.connect(actx.destination);
                let n = actx.currentTime;
                if(t==='ok'){ 
                    o.frequency.setValueAtTime(650,n); 
                    o.frequency.setValueAtTime(850,n+0.1); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.2); 
                }
                if(t==='err'){ 
                    o.frequency.setValueAtTime(200,n); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.3); 
                }
            } catch(e){}
        }

        function generateSecureHash(name, score, timestamp) {
            let data = `${name}|${score}|${timestamp}|BEL2024SECURE`;
            let hash = 0;
            for(let i = 0; i < data.length; i++) {
                let char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

            { type: "grammar", q: "The results __________ that neither approach __________ entirely effective.", a: ["suggest / is", "suggests / are", "suggest / are", "suggests / is"], c: 2, exp: "'Results' (plural) = 'suggest'; 'approach' (singular) = 'is'." },
            { type: "reading", passage: "Neuroplasticity is the brain's ability to reorganize itself and challenges assumptions about fixed cognitive capacity.", q: "What does it challenge?", a: ["Exercise", "Fixed capacity assumptions", "Medicine", "Methods"], c: 1, exp: "Challenges assumptions about fixed capacity." },
            { type: "listening", text: "Addressing climate change requires synthesizing insights from science, economics, and policy.", q: "What is required?", a: ["Single discipline", "Multiple fields synthesis", "Political consensus", "Data alone"], c: 1, exp: "Requires synthesis from multiple fields." },
            { type: "grammar", q: "If they __________ implemented earlier, it __________ less severe.", a: ["had / would be", "would have / had been", "had / would have been", "would / would be"], c: 2, exp: "3rd conditional: had + would have been." },
            { type: "choice", q: "Which term means systematic variation over intervals?", a: ["Anomalous", "Cyclical", "Stochastic", "Random"], c: 1, exp: "'Cyclical' = systematic variation over regular intervals." },
            { type: "memory", q: "ابحث عن 'Synthesis'", words: ["🔀 Analysis", "🧬 Synthesis", "📉 Breakdown", "🔍 Exam"], target: "🧬 Synthesis", exp: "✓ Synthesis = دمج عناصر" },
            { type: "listening", text: "Educational attainment and socioeconomic mobility have significance, but mechanisms are contested.", q: "What is contested?", a: ["Significance", "Correlation", "Causal mechanisms", "Value"], c: 2, exp: "Causal mechanisms remain contested." },
            { type: "reading", passage: "Frameworks prioritizing empirical verification overlook contextual understanding importance.", q: "What is overlooked?", a: ["Data", "Method", "Contextual understanding", "Analysis"], c: 2, exp: "Overlook contextual understanding." },
            { type: "grammar", q: "The committee __________ divided on whether to __________ the proposal.", a: ["were / endorse", "was / endorse", "were / endorsing", "was / endorse"], c: 0, exp: "'Committee' plural; 'endorse' follows 'whether to'." },
            { type: "choice", q: "What means 'diverse in nature'?", a: ["Uniform", "Heterogeneous", "Pure", "Classified"], c: 1, exp: "'Heterogeneous' = diverse in nature." },
            { type: "memory", q: "ابحث عن 'Methodology'", words: ["🎯 Objective", "📋 Methodology", "📊 Data", "✅ Results"], target: "📋 Methodology", exp: "✓ Methodology = نظام الأساليب" },
            { type: "listening", text: "Sustained intellectual engagement correlates with reduced cognitive decline in aging.", q: "What does engagement correlate with?", a: ["Memory loss", "Reduced decline", "Education costs", "Atrophy"], c: 1, exp: "Correlates with reduced cognitive decline." },
            { type: "reading", passage: "AI raises questions about consciousness, intelligence definition, and machine autonomy ethics.", q: "What questions does it raise?", a: ["Speed", "Consciousness and intelligence", "Languages", "Connectivity"], c: 1, exp: "Raises consciousness and intelligence questions." },
            { type: "grammar", q: "Neither the proposal __________ the argument __________ sufficient.", a: ["nor / were", "nor / was", "or / were", "or / was"], c: 1, exp: "'Neither...nor' singular = 'was'." },
            { type: "choice", q: "What means 'able to adapt'?", a: ["Rigid", "Malleable", "Immutable", "Calcified"], c: 1, exp: "'Malleable' = adaptable and flexible." },
            { type: "memory", q: "ابحث عن 'Convergence'", words: ["📌 Divergence", "🤝 Convergence", "🔀 Separation", "💫 Dispersion"], target: "🤝 Convergence", exp: "✓ Convergence = تقارب" },
            { type: "listening", text: "Sustainable development needs collaboration between scientists, economists, policymakers and communities.", q: "Who must collaborate?", a: ["Scientists only", "Multiple groups", "Governments", "Corporations"], c: 1, exp: "Multiple disciplines and communities." },
            { type: "reading", passage: "Initial success creates conditions for subsequent achievements, widening disparities over time.", q: "What does it create?", a: ["Obstacles", "Success conditions", "Equality", "Random outcomes"], c: 1, exp: "Creates conditions for further success." },
            { type: "grammar", q: "The data __________ that behavior __________ influenced by algorithms.", a: ["appears / are", "appear / is", "appears / is", "appear / are"], c: 2, exp: "'Data' works with 'appears'; 'behavior' = 'is'." },
            { type: "choice", q: "Which describes systems where parts create unpredictable outcomes?", a: ["Linear", "Complex adaptive", "Static", "Deterministic"], c: 1, exp: "'Complex adaptive systems' = emergent properties." }
        ];

        const BANK_B2 = [
            { type: "choice", q: "Which word describes overcoming adversity with strength?", a: ["Fragile", "Resilient", "Complacent", "Mediocre"], c: 1, exp: "'Resilient' = قادر على التعافي." },
            { type: "grammar", q: "Had the CEO not __________ the merger, the company would have collapsed.", a: ["approved", "approve", "approves", "approving"], c: 0, exp: "3rd conditional: had approved." },
            { type: "listening", text: "Quantum computing paradigm shift necessitates reassessment of computational infrastructure.", q: "What requires reassessment?", a: ["Strategy", "Infrastructure", "Benefits", "Location"], c: 1, exp: "Computational infrastructure." },
            { type: "choice", q: "Sophisticated synonym for 'cunning'?", a: ["Stupid", "Shrewd", "Honest", "Careless"], c: 1, exp: "'Shrewd' = ذكي وماكر." },
            { type: "memory", q: "ابحث عن 'Ambiguous'", words: ["📍 Definite", "❓ Ambiguous", "🎯 Clear", "📖 Obvious"], target: "❓ Ambiguous", exp: "✓ Ambiguous = غامض" },
            { type: "grammar", q: "Quantum mechanics intricacies __________ baffled physicists.", a: ["have", "has", "having", "was"], c: 0, exp: "'Intricacies' plural = 'have'." },
            { type: "reading", passage: "Post-modern epistemology challenges objective truth notion, advocates relativistic interpretation.", q: "What does it challenge?", a: ["Progress", "Objective truth", "Innovation", "Systems"], c: 1, exp: "Objective truth notion." },
            { type: "listening", text: "AI discourse perpetuates socioeconomic stratification and exacerbates inequalities.", q: "What does discourse perpetuate?", a: ["Innovation", "Equality", "Stratification", "Democracy"], c: 2, exp: "Socioeconomic stratification." },
            { type: "grammar", q: "Not only __________ she demonstrated acumen, but also revolutionized.", a: ["has", "she", "did", "was"], c: 0, exp: "'Not only' inversion = 'has she'." },
            { type: "choice", q: "Most precise definition of 'ephemeral'?", a: ["Permanent", "Lasting briefly", "Comprehensive", "Substantial"], c: 1, exp: "'Ephemeral' = قصير الأجل." },
            { type: "memory", q: "ابحث عن 'Pragmatic'", words: ["🎭 Idealistic", "💼 Pragmatic", "🌙 Romantic", "📚 Theoretical"], target: "💼 Pragmatic", exp: "✓ Pragmatic = عملي" },
            { type: "listening", text: "Contemporary discourse bifurcation reflects epistemological framework dissolution.", q: "What reflects dissolution?", a: ["Methods", "Bifurcation", "Progress", "Harmony"], c: 1, exp: "Discourse bifurcation." },
            { type: "reading", passage: "Human experience commodification engenders metaphysical crisis, identity fragmentation.", q: "What engenders crisis?", a: ["Education", "Commodification", "Art", "Discovery"], c: 1, exp: "Commodification of experience." },
            { type: "grammar", q: "Had we __________ quantum entanglement nature, we would revise framework.", a: ["anticipated", "anticipates", "anticipating", "had anticipated"], c: 0, exp: "3rd conditional: had anticipated." },
            { type: "choice", q: "Term encapsulating inevitable decline?", a: ["Ascension", "Apotheosis", "Denouement", "Inexorable obsolescence"], c: 3, exp: "'Inexorable obsolescence' = منع التدهور مستحيل." },
            { type: "memory", q: "ابحث عن 'Esoteric'", words: ["🌍 Exoteric", "🔐 Esoteric", "📢 Public", "🎪 Spectacle"], target: "🔐 Esoteric", exp: "✓ Esoteric = خاص" },
            { type: "listening", text: "Discourse instrumentalization systematically undermines democratic participation.", q: "What does it undermine?", a: ["Growth", "Participation", "Innovation", "Profits"], c: 1, exp: "Democratic participation." },
            { type: "reading", passage: "Phenomenological analysis reveals reductionist framework insufficiency regarding consciousness.", q: "What reveals insufficiency?", a: ["Method", "Analysis", "Research", "Statistics"], c: 1, exp: "Phenomenological analysis." },
            { type: "grammar", q: "Should prescriptions __________ implemented, restructuring would ensue.", a: ["be", "been", "being", "are"], c: 0, exp: "Subjunctive: should be." },
            { type: "choice", q: "Describes determinism and agency interplay?", a: ["Unrelated", "Dialectical tension", "Hierarchical", "Exclusive"], c: 1, exp: "'Dialectical tension' = علاقة متوترة." },
            { type: "memory", q: "ابحث عن 'Juxtapose'", words: ["🔗 Combine", "⚔️ Juxtapose", "📌 Connect", "🎯 Align"], target: "⚔️ Juxtapose", exp: "✓ Juxtapose = وضع بجانب" },
            { type: "listening", text: "Epistemic pluralism valorization deconstructs occidental universalism pretensions.", q: "What does it deconstruct?", a: ["Beliefs", "Pretensions", "Hierarchies", "Diversity"], c: 1, exp: "Hegemonic pretensions." },
            { type: "reading", passage: "Lacanian psychoanalysis conceptualizes subjectivity through symbolic mediation lens.", q: "Through what lens?", a: ["Cognitive", "Symbolic mediation", "Behavioral", "Neurochemistry"], c: 1, exp: "Symbolic mediation." },
            { type: "grammar", q: "Pseudoscientific ontologies proliferation __________ epistemological obfuscation consequence.", a: ["is", "are", "were", "being"], c: 0, exp: "'Proliferation' singular = 'is'." },
            { type: "choice", q: "Term for interrogating foundational assumptions?", a: ["Eclecticism", "Hermeneutics", "Ontological deconstruction", "Phenomenological bracketing"], c: 2, exp: "'Ontological deconstruction' = فك تفكيك الافتراضات." }
        ];

        let state = { idx: 0, score: 0, locked: false, user: {}, time: 1800, memoryTimeout: null, inMemory: false, memoryAnswered: false, level: '' };

        document.querySelector('.start-btn').addEventListener('click', function() {
            let n = document.getElementById('u-name').value; 
            let a = document.getElementById('u-age').value; 
            let g = document.getElementById('u-gender').value;
            
            if(!n || !a || !g) { alert("برجاء إكمال البيانات!"); return; }
            
            state.user = { n, a, g };
            state.level = (a === 'Under 20') ? 'A2' : 'B2';
            
            document.body.classList.remove('female-under20', 'female-over20', 'male-under20', 'male-over20');
            if(g === 'Male') {
                document.body.classList.add(a === 'Under 20' ? 'male-under20' : 'male-over20');
            } else {
                document.body.classList.add(a === 'Under 20' ? 'female-under20' : 'female-over20');
            }
            
            snd('ok');
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('timer').style.display = 'block';
            loadQ();
            startTimer();
        });

        function startTimer() {
            setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60), s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                if(state.time <= 0) endQuiz();
            }, 1000);
        }

        function loadQ() {
            state.locked = false;
            state.inMemory = false;
            state.memoryAnswered = false;
            if(state.memoryTimeout) clearTimeout(state.memoryTimeout);
            
            ['tool-listen','tool-read','tool-magic','btn-next','exp-box'].forEach(id => {
                let el = document.getElementById(id);
                if(el) { el.style.display = 'none'; if(id === 'tool-magic') el.innerHTML = ''; }
            });
            document.getElementById('options-box').innerHTML = "";
            
            let BANK = (state.level === 'A2') ? BANK_A2 : BANK_B2;
            let q = BANK[state.idx];
            document.getElementById('q-num').innerText = `${(state.idx+1).toString().padStart(2,'0')}/25`;
            document.getElementById('prog-bar').style.width = `${((state.idx+1)/25)*100}%`;
            
            if(q.type === 'memory') {
                document.getElementById('q-text').innerText = '';
                runMemory(q);
            } else {
                document.getElementById('q-text').innerText = q.q;
                
                if(q.type==='listening') {
                    document.getElementById('tool-listen').style.display = 'block';
                    document.getElementById('tool-listen').querySelector('button').onclick = playAudio;
                }
                if(q.type==='reading') {
                    document.getElementById('tool-read').innerText = q.passage;
                    document.getElementById('tool-read').style.display = 'block';
                }

                q.a.forEach((opt, i) => {
                    let b = document.createElement('button');
                    b.className = "opt-btn";
                    b.type = "button";
                    b.innerText = opt;
                    b.onclick = () => check(i, q.c, b, q.exp);
                    document.getElementById('options-box').appendChild(b);
                });
            }
        }

        function playAudio() {
            let BANK = (state.level === 'A2') ? BANK_A2 : BANK_B2;
            let u = new SpeechSynthesisUtterance(BANK[state.idx].text);
            u.lang = 'en-US';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function check(idx, correct, btn, exp) {
            if(state.locked) return;
            state.locked = true;
            let btns = document.querySelectorAll('.opt-btn');
            let isCorrect = idx === correct;
            
            if(isCorrect) {
                snd('ok');
                state.score++;
                btn.classList.add('opt-correct');
            } else {
                snd('err');
                btn.classList.add('opt-wrong');
                btns[correct].classList.add('opt-correct');
            }
            
            btns.forEach(b => b.disabled = true);
            let eb = document.getElementById('exp-box');
            eb.innerHTML = `<strong>📝 التفسير:</strong><br>${exp}`;
            eb.style.display = 'block';
            eb.style.borderColor = isCorrect ? '#10b981' : '#ef4444';
            eb.style.background = isCorrect ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('btn-next').onclick = nextQ;
        }

        function runMemory(q) {
            state.inMemory = true;
            document.getElementById('countdown-overlay').style.display = 'flex';
            
            let countdown = 5;
            const countdownNumber = document.getElementById('countdown-number');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                countdownNumber.innerText = countdown;
                if(countdown === 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown-overlay').style.display = 'none';
                    
                    let tool = document.getElementById('tool-magic');
                    tool.style.display = 'flex';
                    tool.innerHTML = "";
                    let cards = [];
                    
                    q.words.forEach((w, i) => {
                        let c = document.createElement('div');
                        c.className = "m-card";
                        c.innerHTML = `<div class="m-card-inner"><div class="m-card-front">${w}</div><div class="m-card-back">BE</div></div>`;
                        tool.appendChild(c);
                        cards.push({el: c, word: w, clicked: false});
                    });
                    
                    state.memoryTimeout = setTimeout(() => {
                        cards.forEach(c => c.el.classList.add('flipped'));
                        document.getElementById('q-text').innerText = q.q;
                        
                        cards.forEach(c => {
                            c.el.onclick = () => {
                                if(state.locked || state.memoryAnswered || c.clicked) return;
                                c.clicked = true;
                                state.locked = true;
                                state.memoryAnswered = true;
                                
                                c.el.classList.remove('flipped');
                                let isCorrect = c.word.trim() === q.target.trim();
                                
                                if(isCorrect) {
                                    snd('ok');
                                    state.score++;
                                } else {
                                    snd('err');
                                }
                                
                                let eb = document.getElementById('exp-box');
                                eb.innerHTML = `<strong>💡 الذاكرة:</strong><br>${q.exp}`;
                                eb.style.display = 'block';
                                document.getElementById('btn-next').style.display = 'block';
                                document.getElementById('btn-next').onclick = nextQ;
                            };
                        });
                    }, 2000);
                }
            }, 1000);
        }

        function nextQ() {
            state.idx++;
            if(state.idx < 25) loadQ();
            else endQuiz();
        }

        function endQuiz() {
            let timestamp = Date.now();
            let hash = generateSecureHash(state.user.n, state.score, timestamp);
            let dateStr = new Date(timestamp).toLocaleString('ar-EG');
            
            let msgBody = `🎓 Bel-Engleezi Assessment Result
━━━━━━━━━━━━━━━━━━
👤 الطالب: ${state.user.n}
📊 النتيجة: ${state.score}/25
👥 الجنس: ${state.user.g}
🎂 السن: ${state.user.a}
⏰ التوقيت: ${dateStr}
🔐 كود التحقق: ${hash}
✨ شهادة النجاح من Bel-Engleezi Academy`;
            
            document.body.innerHTML = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f1b3c 0%, #1a2850 50%, #0f1b3c 100%); display: flex; align-items: center; justify-content: center; z-index: 1000;">
                <div style="background: linear-gradient(135deg, rgba(15, 27, 60, 0.92), rgba(26, 40, 80, 0.88)); backdrop-filter: blur(25px); border: 2px solid rgba(212, 175, 55, 0.35); padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; color: white; animation: popUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);">
                    <style>
                        @keyframes popUp {
                            from { opacity: 0; transform: scale(0.5) rotate(-180deg); }
                            to { opacity: 1; transform: scale(1) rotate(0deg); }
                        }
                        .celebrate { animation: bounce 0.8s ease-in-out infinite; }
                        @keyframes bounce {
                            0%, 100% { transform: translateY(0) rotate(0deg); }
                            50% { transform: translateY(-30px) rotate(15deg); }
                        }
                        .score-text { 
                            background: linear-gradient(135deg, #d4af37, #e5c158);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                        }
                    </style>
                    <div class="celebrate" style="font-size: 3rem; margin-bottom: 20px;">🎉</div>
                    <h1 style="color: #d4af37; margin-bottom: 20px; font-size: 2rem;">تم إنهاء الاختبار!</h1>
                    <p class="score-text" style="font-size: 2rem; margin: 20px 0; font-weight: 900;">النتيجة: ${state.score}/25</p>
                    <button onclick="window.open('https://wa.me/201144576661?text=' + encodeURIComponent(\`${msgBody}\`))" style="background: linear-gradient(135deg, #25D366, #20BA58); color: white; padding: 15px 35px; border-radius: 25px; border: none; font-weight: 900; cursor: pointer; font-size: 1rem; transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.08)'; this.style.boxShadow='0 8px 25px rgba(37, 211, 102, 0.5)';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none';">📲 أرسل النتيجة</button>
                </div>
            </div>`;
        }
    </script>
</body>
