<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bel-Engleezi | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Montserrat', 'Cairo', sans-serif; 
            color: #fff; 
            overflow-x: hidden; 
            user-select: none; 
            background: #f5f5f5;
            transition: background 1.5s cubic-bezier(0.34, 1.56, 0.64, 1), background-size 1.5s ease;
        }
        
        /* Gender & Age-Based Gradient Backgrounds */
        body.female-under20 {
            background: linear-gradient(-45deg, #ff6b9d, #ffa8cc, #ffb3d9, #ffc0e3);
            background-size: 400% 400%;
            animation: gradientBG 25s ease infinite;
        }
        
        body.female-over20 {
            background: linear-gradient(-45deg, #f093fb, #f5576c, #ff8fab, #ffc0cb);
            background-size: 400% 400%;
            animation: gradientBG 25s ease infinite;
        }
        
        body.male-under20 {
            background: linear-gradient(-45deg, #667eea, #764ba2, #8b5cf6, #a78bfa);
            background-size: 400% 400%;
            animation: gradientBG 25s ease infinite;
        }
        
        body.male-over20 {
            background: linear-gradient(-45deg, #4facfe, #00f2fe, #1e90ff, #00bfff);
            background-size: 400% 400%;
            animation: gradientBG 25s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Particle Background */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: inherit;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        
        /* Glass Panel - Default for start screen */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        /* Dark Glass Panel for Quiz Area - Gender Based */
        body.female-under20 .glass-panel,
        body.female-over20 .glass-panel {
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.25), rgba(245, 87, 108, 0.25)) !important;
            border: 2px solid rgba(255, 107, 157, 0.4) !important;
            box-shadow: 
                0 8px 32px rgba(240, 147, 251, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 50px rgba(255, 107, 157, 0.2) !important;
            backdrop-filter: blur(25px) !important;
        }
        
        body.male-under20 .glass-panel,
        body.male-over20 .glass-panel {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25), rgba(79, 172, 254, 0.25)) !important;
            border: 2px solid rgba(102, 126, 234, 0.4) !important;
            box-shadow: 
                0 8px 32px rgba(102, 126, 234, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 50px rgba(79, 172, 254, 0.2) !important;
            backdrop-filter: blur(25px) !important;
        }
        
        /* Start Screen Special styling */
        #start-screen {
            animation: slideInForm 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border-top: 4px solid rgba(255, 255, 255, 0.5);
        }
        
        @keyframes slideInForm {
            from { 
                opacity: 0; 
                transform: translateY(-50px) scale(0.9) rotateX(-20deg);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1) rotateX(0deg);
            }
        }
        
        /* Quiz Area with animated border */
        #quiz-area .glass-panel {
            animation: glowBorder 3s ease-in-out infinite;
            position: relative;
        }
        
        @keyframes glowBorder {
            0%, 100% { 
                box-shadow: 
                    0 8px 32px rgba(102, 126, 234, 0.2),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2),
                    0 0 30px rgba(102, 126, 234, 0.1);
            }
            50% { 
                box-shadow: 
                    0 8px 32px rgba(102, 126, 234, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 60px rgba(102, 126, 234, 0.3);
            }
        }
        
        body.female-under20 #quiz-area .glass-panel,
        body.female-over20 #quiz-area .glass-panel {
            animation: glowBorderFemale 3s ease-in-out infinite;
        }
        
        @keyframes glowBorderFemale {
            0%, 100% { 
                box-shadow: 
                    0 8px 32px rgba(240, 147, 251, 0.2),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2),
                    0 0 30px rgba(240, 147, 251, 0.1);
            }
            50% { 
                box-shadow: 
                    0 8px 32px rgba(240, 147, 251, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 60px rgba(240, 147, 251, 0.3);
            }
        }
        
        /* Select dropdown */
        select {
            background-image: none !important;
            background-color: rgba(255,255,255,0.15) !important;
            color: #fff !important;
            font-weight: 600;
        }
        
        select option {
            background: #667eea;
            color: white;
            padding: 10px;
        }
        
        .opt-btn { 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(255,255,255,0.3); 
            cursor: pointer; 
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            margin: 4px 0;
            position: relative;
            overflow: hidden;
            color: #fff;
            font-weight: 600;
        }
        
        .opt-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .opt-btn:hover:not(:disabled)::before {
            width: 300px;
            height: 300px;
        }
        
        .opt-btn:hover:not(:disabled) { 
            transform: scale(1.08) translateY(-2px); 
            border-color: rgba(255,255,255,0.8); 
            background: rgba(255,255,255,0.15);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .opt-correct { 
            background: rgba(52, 211, 153, 0.4) !important; 
            border-color: #34d399 !important;
            animation: correctPulse 0.6s ease-out;
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.6) !important;
        }
        
        .opt-wrong { 
            background: rgba(248, 113, 113, 0.4) !important; 
            border-color: #f87171 !important;
            animation: wrongShake 0.5s ease-out;
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.6) !important;
        }
        
        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* Memory Cards */
        #tool-magic {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            margin: 20px 0 20px 0;
            min-height: 160px;
        }
        
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        
        .countdown-box {
            text-align: center;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.3) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .countdown-timer {
            font-size: 6rem;
            font-weight: 900;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px rgba(102, 126, 234, 0.6);
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .m-card {
            width: 90px;
            height: 130px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            animation: slideUp 0.6s ease-out;
        }
        
        .m-card:hover:not(.flipped) {
            transform: translateY(-8px);
        }
        
        @keyframes slideUp {
            from { transform: translateY(40px) rotateX(-60deg); opacity: 0; }
            to { transform: translateY(0) rotateX(0deg); opacity: 1; }
        }
        
        .m-card.flipped {
            transform: rotateY(180deg);
        }
        
        .m-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s;
            transform-style: preserve-3d;
        }
        
        .m-card-front, .m-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 3px solid rgba(255,255,255,0.6);
            font-size: 0.7rem;
            padding: 8px;
            text-align: center;
            line-height: 1.1;
        }
        
        .m-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .m-card-back {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            transform: rotateY(180deg);
            font-size: 2.2rem;
            box-shadow: 0 0 30px rgba(245, 87, 108, 0.6), inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .m-card-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .m-card.found .m-card-back {
            background: linear-gradient(135deg, #34d399, #10b981);
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.8);
        }
        
        .exp-text { color: #fff; font-size: 0.9rem; line-height: 1.6; }
        
        .celebration-emoji {
            font-size: 4.5rem;
            animation: bounce 0.8s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }
        
        .score-display {
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            animation: scoreGlow 2s ease-in-out infinite;
        }
        
        @keyframes scoreGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(240, 147, 251, 0.8)); }
        }
        
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #20BA58);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .whatsapp-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.5s ease;
        }
        
        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.8);
        }
        
        .whatsapp-btn:hover::before {
            left: 100%;
        }

        #options-box {
            gap: 8px !important;
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }

        #quiz-area {
            padding: 0 8px;
            animation: slideInDown 0.6s ease-out;
        }
        
        @keyframes slideInDown {
            from { transform: translateY(-40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .glass-panel {
            padding: 16px !important;
        }

        #q-text {
            margin-bottom: 0px !important;
            font-size: 1.3rem !important;
            line-height: 1.5;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: questionAppear 0.6s ease-out;
            color: #fff;
            font-weight: 600;
        }
        
        @keyframes questionAppear {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        #exp-box {
            margin-top: 12px !important;
            padding: 14px !important;
            font-size: 0.85rem;
            animation: expandBox 0.5s ease-out;
            color: #fff;
        }
        
        @keyframes expandBox {
            from { opacity: 0; max-height: 0; transform: translateY(-10px); }
            to { opacity: 1; max-height: 300px; transform: translateY(0); }
        }

        #btn-next {
            margin-top: 14px !important;
            padding: 13px !important;
            font-size: 1rem;
            animation: slideInUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #btn-next::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        #btn-next:hover::before {
            width: 400px;
            height: 400px;
        }

        #tool-listen {
            margin-top: 10px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease-out;
        }

        #tool-read {
            margin-top: 10px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease-out;
            color: #fff;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Input styling for start screen */
        input {
            color: #fff !important;
            font-weight: 600;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        
        input:focus {
            background-color: rgba(255,255,255,0.2) !important;
        }
        
        /* Header */
        header {
            background: rgba(0, 0, 0, 0.1) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        
        h2 {
            color: #fff !important;
        }
        
        label {
            color: #fff !important;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="particle-bg" id="particle-container"></div>

    <header class="p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full border-2 border-white overflow-hidden bg-white/20">
                <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=BE&background=667eea&color=fff';">
            </div>
            <div>
                <h1 class="text-lg font-black text-white uppercase tracking-tight">Bel-Engleezi</h1>
                <p class="text-white/80 text-[8px] font-bold tracking-wide uppercase mt-[-2px]">Academy</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div id="timer" class="hidden font-mono text-lg text-white border border-white/30 px-3 py-1 rounded-full bg-black/20">30:00</div>
        </div>
    </header>

    <main class="min-h-[85vh] flex items-center justify-center p-3">
        <div id="start-screen" class="glass-panel p-8 rounded-3xl max-w-md w-full">
            <h2 class="text-3xl font-black text-center mb-6">Student Entry</h2>
            <div class="space-y-4" dir="rtl">
                <div>
                    <label class="block font-bold mb-2 text-sm">الاسم بالكامل</label>
                    <input type="text" id="u-name" placeholder="أدخل اسمك الكامل" class="w-full bg-white/20 p-3 rounded-lg border border-white/30 focus:border-white text-center outline-none text-sm">
                </div>
                <div>
                    <label class="block font-bold mb-2 text-sm">المرحلة العمرية</label>
                    <select id="u-age" class="w-full p-3 rounded-lg border border-white/30 focus:border-white text-center outline-none text-sm">
                        <option value="" disabled selected style="color: gray;">اختر المرحلة العمرية</option>
                        <option value="Under 20">أقل من 20 سنة</option>
                        <option value="Over 20">أكبر من 20 سنة</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold mb-2 text-sm">النوع</label>
                    <select id="u-gender" class="w-full p-3 rounded-lg border border-white/30 focus:border-white text-center outline-none text-sm">
                        <option value="" disabled selected style="color: gray;">اختر النوع</option>
                        <option value="Male">ذكر</option>
                        <option value="Female">أنثى</option>
                    </select>
                </div>
            </div>
            <button onclick="startApp()" class="w-full mt-8 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black text-lg py-3 rounded-lg hover:shadow-lg transition-all hover:scale-105">ابدأ التحدي 🚀</button>
        </div>

        <div id="quiz-area" class="hidden max-w-lg w-full">
            <div class="flex items-center gap-3 mb-4 glass-panel p-2 rounded-xl">
                <div class="flex-grow h-2 bg-white/20 rounded-full overflow-hidden">
                    <div id="prog-bar" class="h-full bg-gradient-to-r from-purple-400 to-pink-400 w-0 transition-all duration-500"></div>
                </div>
                <span id="q-num" class="font-black text-white text-sm tracking-widest">01/25</span>
            </div>

            <div class="glass-panel rounded-2xl min-h-auto flex flex-col justify-start">
                <h2 id="q-text" class="text-xl font-bold leading-snug text-center"></h2>
                
                <div id="tool-listen" class="hidden text-center">
                    <button onclick="playAudio()" class="bg-white/10 text-white border border-white/30 px-6 py-2 rounded-full font-bold text-sm hover:bg-white/20 transition-all hover:scale-110">🔊 استمع</button>
                </div>
                <div id="tool-read" class="hidden bg-white/5 p-3 rounded-lg border-l-4 border-white/50 italic text-xs max-h-24 overflow-y-auto"></div>
                
                <div id="tool-magic" class="hidden"></div>

                <div id="options-box"></div>
                
                <div id="exp-box" class="hidden rounded-lg border text-right font-medium leading-relaxed border-white/30 bg-white/5"></div>

                <button id="btn-next" onclick="nextQ()" class="hidden w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg font-black text-base hover:shadow-lg transition-all">السؤال التالي ⮕</button>
            </div>
        </div>
    </main>

    <!-- Countdown Overlay -->
    <div id="countdown-overlay" class="hidden countdown-overlay">
        <div class="countdown-box">
            <div class="text-3xl font-black mb-3 text-white">خذ نفس عميق وركز</div>
            <div class="countdown-timer" id="countdown-number">5</div>
            <div class="text-2xl text-white/90 font-bold">استعد للعبة الممتعة 🎮</div>
        </div>
    </div>

    <script>
        // Create Particle Background
        function createParticles() {
            const container = document.getElementById('particle-container');
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 20) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Sound System
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx;
        function snd(t) {
            try {
                if(!actx) actx = new AudioContext();
                const o = actx.createOscillator(), g = actx.createGain();
                o.connect(g); g.connect(actx.destination);
                let n = actx.currentTime;
                if(t==='ok'){ 
                    o.frequency.setValueAtTime(600,n); 
                    o.frequency.setValueAtTime(800,n+0.1); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.2); 
                }
                if(t==='err'){ 
                    o.frequency.setValueAtTime(200,n); 
                    g.gain.setValueAtTime(0.1,n); 
                    o.start(n); 
                    o.stop(n+0.3); 
                }
            } catch(e){}
        }

        // Anti-Cheating System
        function generateSecureHash(name, score, timestamp) {
            let data = `${name}|${score}|${timestamp}|BEL2024SECURE`;
            let hash = 0;
            for(let i = 0; i < data.length; i++) {
                let char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        // A2 Level Questions
        const BANK_A2 = [
            { type: "choice", q: "What is the opposite of 'busy'?", a: ["Lazy", "Free", "Tired", "Sad"], c: 1, exp: "'Free' is the opposite of 'busy' - when you're not occupied with activities." },
            { type: "grammar", q: "She __________ to the cinema every weekend.", a: ["goes", "go", "going", "went"], c: 0, exp: "Simple present tense: 'She goes' - action that happens regularly." },
            { type: "listening", text: "I really enjoy playing football in the park with my friends on sunny days.", q: "What does the speaker like doing?", a: ["Reading books", "Playing football", "Watching TV", "Sleeping"], c: 1, exp: "The speaker clearly states they enjoy 'playing football'." },
            { type: "choice", q: "Choose the correct spelling:", a: ["Restuarant", "Restaurant", "Restarant", "Restaurent"], c: 1, exp: "'Restaurant' is the correct spelling - a place where you eat food." },
            { type: "memory", q: "ابحث عن 'Hello'", words: ["👋 Hello", "🌙 Goodbye", "❓ Question", "🎉 Party"], target: "👋 Hello", exp: "⭐ ممتاز! 'Hello' = التحية والترحيب" },
            { type: "grammar", q: "Do you __________ a pet?", a: ["has", "have", "having", "had"], c: 1, exp: "With 'you' we use 'have' in present tense, not 'has'." },
            { type: "reading", passage: "My best friend likes chocolate ice cream. We eat it together every Friday after school.", q: "When do they eat ice cream?", a: ["Every day", "Friday after school", "Never", "On weekends"], c: 1, exp: "The text says 'every Friday after school' - that's when they eat it." },
            { type: "listening", text: "The weather is very hot today, so I'm going to the beach to swim and have fun.", q: "Why is the speaker going to the beach?", a: ["To work", "To swim and have fun", "To sleep", "To read"], c: 1, exp: "The speaker says they're going to swim and have fun because it's hot." },
            { type: "grammar", q: "I __________ my homework yesterday.", a: ["do", "did", "doing", "does"], c: 1, exp: "'Did' is past tense - for actions that happened before now." },
            { type: "choice", q: "What does 'expensive' mean?", a: ["Cheap", "Costs a lot of money", "Old", "Beautiful"], c: 1, exp: "'Expensive' means something costs a lot of money." },
            { type: "memory", q: "ابحث عن 'Happy'", words: ["😊 Happy", "😢 Sad", "😴 Sleepy", "🤔 Confused"], target: "😊 Happy", exp: "🌟 برافو! 'Happy' = السعادة والفرح" },
            { type: "listening", text: "My family loves to cook together on Sunday. We make pasta and pizza.", q: "What do they make?", a: ["Soup and salad", "Pasta and pizza", "Rice and beans", "Bread and cheese"], c: 1, exp: "The speaker mentions they make 'pasta and pizza' together." },
            { type: "reading", passage: "Tom is a student. He studies English, math, and science. He is very smart.", q: "What subjects does Tom study?", a: ["Art and music", "English, math, and science", "History and geography", "Just English"], c: 1, exp: "Tom studies 'English, math, and science' according to the passage." },
            { type: "grammar", q: "They __________ play games in the garden.", a: ["not", "don't", "doesn't", "didn't"], c: 1, exp: "'Don't' is for 'they' in present negative - they don't play games." },
            { type: "choice", q: "Which is a fruit?", a: ["Carrot", "Apple", "Tomato", "Onion"], c: 1, exp: "'Apple' is a fruit - sweet and grows on trees." },
            { type: "memory", q: "ابحث عن 'Love'", words: ["💕 Love", "😠 Hate", "😐 Neutral", "🤐 Quiet"], target: "💕 Love", exp: "✨ ممتاز! 'Love' = الحب والعشق" },
            { type: "listening", text: "I have three siblings: two brothers and one sister. We play together every day.", q: "How many siblings does the speaker have?", a: ["Two", "Three", "Four", "One"], c: 1, exp: "The speaker says 'two brothers and one sister' = three siblings total." },
            { type: "reading", passage: "Books are my favorite thing. I read every day. They help me learn new words.", q: "What helps the speaker learn?", a: ["Games", "Music", "Books", "Movies"], c: 2, exp: "The passage says 'Books... help me learn new words'." },
            { type: "grammar", q: "She __________ a beautiful dress.", a: ["wear", "wears", "wearing", "wore"], c: 1, exp: "'Wears' is simple present - she currently has on a beautiful dress." },
            { type: "choice", q: "What is the opposite of 'big'?", a: ["Large", "Small", "Huge", "Tiny"], c: 1, exp: "'Small' is a good opposite of 'big'." },
            { type: "memory", q: "ابحث عن 'Beautiful'", words: ["🌸 Beautiful", "😡 Ugly", "⚫ Dark", "📏 Tall"], target: "🌸 Beautiful", exp: "👍 متقن! 'Beautiful' = جميل وساحر" },
            { type: "listening", text: "I love sports! I play basketball and tennis. They are very fun.", q: "What sports does the speaker play?", a: ["Football and volleyball", "Basketball and tennis", "Badminton and cricket", "Golf and hockey"], c: 1, exp: "The speaker says 'I play basketball and tennis'." },
            { type: "reading", passage: "My daily routine: I wake up at 7am, eat breakfast, go to school, and come home at 3pm.", q: "What time does the speaker wake up?", a: ["6am", "7am", "8am", "9am"], c: 1, exp: "The passage clearly states 'I wake up at 7am'." },
            { type: "grammar", q: "We __________ to the park tomorrow.", a: ["go", "goes", "going", "went"], c: 0, exp: "'Go' with simple future for 'we' - we go to the park tomorrow." },
            { type: "choice", q: "Which animal says 'meow'?", a: ["Dog", "Cat", "Cow", "Bird"], c: 1, exp: "'Cat' says 'meow' - that's the sound a cat makes." }
        ];

        // B2 Level Questions
        const BANK_B2 = [
            { type: "choice", q: "Which word best describes someone who overcomes adversity with strength?", a: ["Fragile", "Resilient", "Complacent", "Mediocre"], c: 1, exp: "'Resilient' = قادر على التعافي من الصدمات والتحديات بقوة." },
            { type: "grammar", q: "Had the CEO not __________ the merger, the company would have collapsed.", a: ["approved", "approve", "approves", "approving"], c: 0, exp: "Mixed conditional (3rd): 'Had not approved' - hypothetical past situation." },
            { type: "listening", text: "The paradigm shift in quantum computing necessitates a fundamental reassessment of our computational infrastructure.", q: "What requires reassessment?", a: ["Marketing strategy", "Computational infrastructure", "Employee benefits", "Office location"], c: 1, exp: "النص يقول أن التحول يتطلب إعادة تقييم 'computational infrastructure'." },
            { type: "choice", q: "Choose the most sophisticated synonym for 'cunning':", a: ["Stupid", "Shrewd", "Honest", "Careless"], c: 1, exp: "'Shrewd' = ذكي وماكر في التعامل، خاصة في المسائل المالية." },
            { type: "memory", q: "ابحث عن 'Ambiguous'", words: ["📍 Definite", "❓ Ambiguous", "🎯 Clear", "📖 Obvious"], target: "❓ Ambiguous", exp: "⭐ ممتاز! 'Ambiguous' = غامض وقابل لتفسيرات متعددة" },
            { type: "grammar", q: "The intricacies of quantum mechanics __________ baffled even the most erudite physicists.", a: ["have", "has", "having", "was"], c: 0, exp: "'Intricacies' (plural) requires 'have' not 'has'." },
            { type: "reading", passage: "Post-modern epistemology challenges the notion of objective truth, advocating instead for a relativistic interpretation of reality.", q: "What does post-modern epistemology challenge?", a: ["Scientific progress", "The notion of objective truth", "Technological innovation", "Economic systems"], c: 1, exp: "النص يوضح أن epistemology يطعن في 'objective truth'." },
            { type: "listening", text: "The hegemonic discourse surrounding artificial intelligence perpetuates socioeconomic stratification and exacerbates systemic inequalities.", q: "What does the discourse perpetuate?", a: ["Innovation", "Equality", "Socioeconomic stratification", "Democracy"], c: 2, exp: "المتحدث يقول أن الخطاب يزيد من 'stratification' وعدم المساواة." },
            { type: "grammar", q: "Not only __________ she demonstrated unprecedented acumen, but she also revolutionized the industry.", a: ["has", "she", "did", "was"], c: 0, exp: "With 'Not only' inversion: 'has she demonstrated'." },
            { type: "choice", q: "What is the most precise definition of 'ephemeral'?", a: ["Permanent", "Lasting briefly", "Comprehensive", "Substantial"], c: 1, exp: "'Ephemeral' = قصير الأجل وسريع الزوال (مثل الزهور التي تفتح يوماً وتموت)." },
            { type: "memory", q: "ابحث عن 'Pragmatic'", words: ["🎭 Idealistic", "💼 Pragmatic", "🌙 Romantic", "📚 Theoretical"], target: "💼 Pragmatic", exp: "🌟 برافو! 'Pragmatic' = عملي وواقعي في التعامل مع الأمور" },
            { type: "listening", text: "The bifurcation of contemporary discourse reflects the dissolution of consensus-based epistemological frameworks.", q: "What reflects the dissolution of frameworks?", a: ["Scientific methods", "The bifurcation of discourse", "Technological progress", "Social harmony"], c: 1, exp: "المتحدث يقول أن 'bifurcation' تعكس الانحلال." },
            { type: "reading", passage: "The commodification of human experience under late capitalism engenders a metaphysical crisis precipitating the fragmentation of identity.", q: "What engenders a metaphysical crisis?", a: ["Education", "Commodification of experience", "Art movements", "Scientific discovery"], c: 1, exp: "النص يقول أن 'commodification' يسبب أزمة metaphysical." },
            { type: "grammar", q: "Had we __________ the counterintuitive nature of quantum entanglement, we would have revised our theoretical framework.", a: ["anticipated", "anticipates", "anticipating", "had anticipated"], c: 0, exp: "3rd conditional: 'Had we anticipated' with past participle." },
            { type: "choice", q: "Which term best encapsulates the concept of inevitable decline?", a: ["Ascension", "Apotheosis", "Denouement", "Inexorable obsolescence"], c: 3, exp: "'Inexorable obsolescence' = عدم الاستطاعة على منع التدهور والزوال." },
            { type: "memory", q: "ابحث عن 'Esoteric'", words: ["🌍 Exoteric", "🔐 Esoteric", "📢 Public", "🎪 Spectacle"], target: "🔐 Esoteric", exp: "✨ رائع! 'Esoteric' = غامض وخاص بفئة قليلة من المتخصصين" },
            { type: "listening", text: "The instrumentalization of discourse within neoliberal frameworks systematically undermines authentic democratic participation.", q: "What does instrumentalization undermine?", a: ["Economic growth", "Authentic democratic participation", "Technological innovation", "Corporate profits"], c: 1, exp: "النص يوضح أن الـ instrumentalization يقوض 'democratic participation'." },
            { type: "reading", passage: "Phenomenological analysis reveals the insufficiency of reductionist ontological frameworks in addressing the lived experience of consciousness.", q: "What reveals insufficiency?", a: ["Scientific method", "Phenomenological analysis", "Empirical research", "Statistical analysis"], c: 1, exp: "النص يقول أن 'phenomenological analysis' يكشف القصور." },
            { type: "grammar", q: "Should the heterodox economist's prescriptions __________ implemented, systemic restructuring would ensue.", a: ["be", "been", "being", "are"], c: 0, exp: "Subjunctive after 'Should': 'Should prescriptions be implemented'." },
            { type: "choice", q: "What best describes the interplay between determinism and agency?", a: ["Unrelated concepts", "Dialectical tension", "Hierarchical", "Mutually exclusive"], c: 1, exp: "'Dialectical tension' = علاقة متوترة وديالكتيكية بين المفهومين." },
            { type: "memory", q: "ابحث عن 'Juxtapose'", words: ["🔗 Combine", "⚔️ Juxtapose", "📌 Connect", "🎯 Align"], target: "⚔️ Juxtapose", exp: "👍 متقن! 'Juxtapose' = وضع شيئين بجانب بعضهما للمقارنة" },
            { type: "listening", text: "The valorization of epistemic pluralism within post-colonial scholarship deconstructs the hegemonic pretensions of occidental universalism.", q: "What does pluralism deconstruct?", a: ["Religious beliefs", "Hegemonic pretensions", "Social hierarchies", "Cultural diversity"], c: 1, exp: "النص يقول أن الـ pluralism تفكك 'hegemonic pretensions'." },
            { type: "reading", passage: "Lacanian psychoanalysis conceptualizes the constitution of subjectivity through the lens of symbolic mediation and the play of absence.", q: "Through what lens is subjectivity conceptualized?", a: ["Cognitive theory", "Symbolic mediation", "Behavioral science", "Neurochemistry"], c: 1, exp: "النص يقول أن ذلك من خلال 'symbolic mediation'." },
            { type: "grammar", q: "The proliferation of pseudoscientific ontologies __________ a direct consequence of epistemological obfuscation.", a: ["is", "are", "were", "being"], c: 0, exp: "'Proliferation' (singular) requires 'is' not 'are'." },
            { type: "choice", q: "Which term encapsulates the systematic interrogation of foundational assumptions?", a: ["Eclecticism", "Hermeneutics", "Ontological deconstruction", "Phenomenological bracketing"], c: 2, exp: "'Ontological deconstruction' = فك تفكيك الافتراضات الأساسية للوجود." }
        ];

        let state = { idx: 0, score: 0, locked: false, user: {}, time: 1800, memoryTimeout: null, inMemory: false, memoryAnswered: false, level: '' };

        function startApp() {
            let n = document.getElementById('u-name').value, 
                a = document.getElementById('u-age').value, 
                g = document.getElementById('u-gender').value;
            
            if(!n || !a || !g) return alert("برجاء إكمال البيانات!");
            
            state.user = { n, a, g };
            state.level = (a === 'Under 20') ? 'A2' : 'B2';
            
            // Apply gradient with smooth animation
            document.body.classList.remove('female-under20', 'female-over20', 'male-under20', 'male-over20');
            
            if(g === 'Male') {
                if(a === 'Under 20') {
                    document.body.classList.add('male-under20');
                } else {
                    document.body.classList.add('male-over20');
                }
            } else {
                if(a === 'Under 20') {
                    document.body.classList.add('female-under20');
                } else {
                    document.body.classList.add('female-over20');
                }
            }
            
            snd('ok');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('timer').classList.remove('hidden');
            loadQ();
            startTimer();
        }

        function startTimer() {
            setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60), s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                if(state.time <= 0) endQuiz();
            }, 1000);
        }

        function loadQ() {
            state.locked = false;
            state.inMemory = false;
            state.memoryAnswered = false;
            if(state.memoryTimeout) clearTimeout(state.memoryTimeout);
            
            ['tool-listen','tool-read','tool-magic','btn-next','exp-box'].forEach(id => {
                let el = document.getElementById(id);
                el.classList.add('hidden');
                if(id === 'tool-magic') el.innerHTML = '';
            });
            document.getElementById('options-box').innerHTML = "";
            
            let BANK = (state.level === 'A2') ? BANK_A2 : BANK_B2;
            let q = BANK[state.idx];
            document.getElementById('q-num').innerText = `${(state.idx+1).toString().padStart(2,'0')}/25`;
            document.getElementById('prog-bar').style.width = `${((state.idx+1)/25)*100}%`;
            
            if(q.type === 'memory') {
                document.getElementById('q-text').innerText = '';
                runMemory(q);
            } else {
                document.getElementById('q-text').innerText = q.q || "";
                
                if(q.type==='listening') document.getElementById('tool-listen').classList.remove('hidden');
                if(q.type==='reading') {
                    document.getElementById('tool-read').innerText = q.passage;
                    document.getElementById('tool-read').classList.remove('hidden');
                }

                if(q.a) {
                    q.a.forEach((opt, i) => {
                        let b = document.createElement('button');
                        b.className = "opt-btn w-full rounded-lg";
                        b.innerText = opt;
                        b.onclick = () => check(i, q.c, b, q.exp);
                        document.getElementById('options-box').appendChild(b);
                    });
                }
            }
        }

        function playAudio() {
            let BANK = (state.level === 'A2') ? BANK_A2 : BANK_B2;
            let u = new SpeechSynthesisUtterance(BANK[state.idx].text);
            u.lang = 'en-US';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function check(idx, correct, btn, exp) {
            if(state.locked) return;
            state.locked = true;
            let btns = document.querySelectorAll('.opt-btn');
            let isCorrect = idx === correct;
            
            if(isCorrect) {
                snd('ok');
                state.score++;
                btn.classList.add('opt-correct');
            } else {
                snd('err');
                btn.classList.add('opt-wrong');
                btns[correct].classList.add('opt-correct');
            }
            btns.forEach(b => b.disabled = true);
            let eb = document.getElementById('exp-box');
            eb.innerHTML = `<strong>📝 التفسير:</strong><br><span class="exp-text">${exp}</span>`;
            eb.className = `rounded-lg border text-right font-medium leading-relaxed block p-2 ${isCorrect?'bg-green-500/20 border-green-400/50':'bg-red-500/20 border-red-400/50'}`;
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function runMemory(q) {
            state.inMemory = true;
            document.getElementById('countdown-overlay').classList.remove('hidden');
            
            let countdown = 5;
            const countdownNumber = document.getElementById('countdown-number');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                countdownNumber.innerText = countdown;
                if(countdown === 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown-overlay').classList.add('hidden');
                    
                    let tool = document.getElementById('tool-magic');
                    tool.classList.remove('hidden');
                    tool.innerHTML = "";
                    let cards = [];
                    q.words.forEach((w, i) => {
                        let c = document.createElement('div');
                        c.className = "m-card";
                        c.innerHTML = `<div class="m-card-inner"><div class="m-card-front">${w}</div><div class="m-card-back"><img src="logo.jpg" alt="Logo" class="m-card-logo" onerror="this.style.display='none'"></div></div>`;
                        tool.appendChild(c);
                        cards.push({el: c, word: w, clicked: false});
                    });
                    
                    state.memoryTimeout = setTimeout(() => {
                        cards.forEach(c => c.el.classList.add('flipped'));
                        document.getElementById('q-text').innerText = q.q;
                        
                        cards.forEach(c => {
                            c.el.onclick = () => {
                                if(state.locked || state.memoryAnswered || c.clicked) return;
                                c.clicked = true;
                                state.locked = true;
                                state.memoryAnswered = true;
                                
                                c.el.classList.remove('flipped');
                                let isCorrect = c.word.trim() === q.target.trim();
                                
                                if(isCorrect) {
                                    snd('ok');
                                    state.score++;
                                    c.el.classList.add('found');
                                } else {
                                    snd('err');
                                }
                                
                                let eb = document.getElementById('exp-box');
                                eb.innerHTML = `<strong>💡 الذاكرة:</strong><br><span class="exp-text">${q.exp}</span>`;
                                eb.className = `rounded-lg border text-right font-medium leading-relaxed block p-2 ${isCorrect?'bg-blue-500/20 border-blue-400/50':'bg-blue-500/20 border-blue-400/50'}`;
                                document.getElementById('btn-next').classList.remove('hidden');
                            };
                        });
                    }, 2000);
                }
            }, 1000);
        }

        function nextQ() {
            state.idx++;
            if(state.idx < 25) loadQ();
            else endQuiz();
        }

        function endQuiz() {
            let timestamp = Date.now();
            let hash = generateSecureHash(state.user.n, state.score, timestamp);
            let dateStr = new Date(timestamp).toLocaleString('ar-EG');
            
            const messages = [
                "🌟 أنت رائع! استمر في الاجتهاد",
                "💪 عمل رائع! أنت على الطريق الصحيح",
                "✨ بداية رائعة! كن فخوراً بنفسك",
                "🎯 أحسنت! سوف تنجح بتأكيد",
                "🏆 أداء ممتاز! أنت مميز"
            ];
            let randomMsg = messages[Math.floor(Math.random() * messages.length)];
            
            let msgBody = `🎓 Bel-Engleezi Assessment Result
━━━━━━━━━━━━━━━━━━
👤 الطالب: ${state.user.n}
📊 النتيجة: ${state.score}/25
📈 المستوى: ${state.level}
🎂 السن: ${state.user.a}
👥 الجنس: ${state.user.g}
⏰ التوقيت: ${dateStr}
━━━━━━━━━━━━━━━━━━
🔐 كود التحقق: ${hash}
✨ شهادة النجاح من Bel-Engleezi Academy`;
            
            document.body.innerHTML = `
            <div class="fixed inset-0 particle-bg" id="particle-container"></div>
            <div class="relative z-10 h-screen flex flex-col items-center justify-center text-center p-4">
                <div class="glass-panel p-8 rounded-2xl max-w-md w-full">
                    <div class="celebration-emoji">🎉</div>
                    <h1 class="text-3xl font-black text-white mb-3">تم إنهاء الاختبار!</h1>
                    <p class="text-lg text-white/90 mb-4">${randomMsg}</p>
                    <div class="score-display text-3xl">${state.score}/25</div>
                    <p class="text-white/70 mb-2 text-sm font-bold">Level: <span class="text-white">${state.level}</span></p>
                    <p class="text-white/70 mb-6 text-sm">درجتك ممتازة! شارك نتيجتك الآن</p>
                    <button onclick="sendWhatsApp(\`${msgBody}\`)" class="whatsapp-btn">
                        <span>📲</span> أرسل النتيجة لـ Mr.Seif
                    </button>
                    <div class="mt-6 text-xs text-white/60">🔐 كود التحقق: <span class="font-mono text-white">${hash}</span></div>
                </div>
            </div>`;
            
            createParticles();
        }

        function sendWhatsApp(message) {
            const phoneNumber = '201144576661';
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
